<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .neon-title {
            color: #fff;
            text-shadow: 0 0 7px #ff6700, 0 0 10px #ff6700, 0 0 21px #ff6700;
            font-weight: 900;
            text-transform: uppercase;
        }
        .btn-mangazone {
            background-color: #ff6700;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-mangazone:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.6);
        }
        .manga-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .manga-card:hover { border-color: #ff6700; }
    </style>
</head>
<body class="p-8">

    <header class="flex justify-between items-center mb-12">
        <h1 class="neon-title text-3xl">MangaZone</h1>
    </header>

    <main id="manga-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
        <p class="text-zinc-500">Cargando biblioteca...</p>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // Tus credenciales de Supabase
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'TU_ANON_KEY_AQUÍ' // PEGA AQUÍ TU CLAVE ANON
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function cargarMangas() {
            const { data, error } = await _supabase.from('Mangas').select('*')

            if (error) return console.error(error)

            const listado = document.getElementById('manga-list')
            listado.innerHTML = '' 

            data.forEach(manga => {
                listado.innerHTML += `
                    <div class="manga-card">
                        <img src="${manga.portada_url}" class="w-full h-80 object-cover">
                        <div class="p-4">
                            <h2 class="font-bold text-sm truncate mb-3 uppercase">${manga.titulo}</h2>
                            <a href="lector-manga.html?url=${encodeURIComponent(manga.leer_url)}" 
                               class="btn-mangazone py-2 text-xs font-black rounded text-white">
                                LEER AHORA
                            </a>
                        </div>
                    </div>
                `
            })
        }
        cargarMangas()
    </script>
</body>
</html>
