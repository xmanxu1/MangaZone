<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* CARRUSEL HERO */
        .swiper-hero { 
            width: 100%; 
            height: 65vh; 
            position: relative; 
        }
        
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #050505 10%, transparent 100%),
                        linear-gradient(to right, #050505 20%, transparent 90%);
            z-index: 1;
        }
        
        .hero-content { 
            position: relative; 
            z-index: 2; 
            padding: 0 8%; 
            display: flex; 
            align-items: center; 
            gap: 40px; 
            height: 100%; 
        }

        /* TARJETAS DE LA BIBLIOTECA */
        .manga-card {
            background: #111; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .manga-card:hover { 
            transform: translateY(-10px); 
            border-color: #ff6700; 
            box-shadow: 0 15px 30px rgba(255, 103, 0, 0.2);
        }
        
        /* Personalización de paginación Swiper */
        .swiper-pagination-bullet { background: white !important; opacity: 0.3; }
        .swiper-pagination-bullet-active { background: #ff6700 !important; opacity: 1; width: 25px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="swiper swiper-hero" id="hero-slider">
        <div class="swiper-wrapper" id="hero-wrapper">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <main class="max-w-[1400px] mx-auto px-[8%] py-16">
        <div class="flex items-center gap-4 mb-10">
            <div class="h-1 w-10 bg-[#ff6700]"></div>
            <h2 class="text-xs text-zinc-500 font-black uppercase tracking-[0.3em]">Biblioteca Completa</h2>
        </div>
        
        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        let allMangas = [];

        // 1. CARGAR NAVBAR Y BUSCADOR
        async function loadNavbar() {
            try {
                const res = await fetch('navbar.html');
                const html = await res.text();
                document.getElementById('navbar-placeholder').innerHTML = html;
                
                const searchInput = document.getElementById('searchInput');
                if(searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        const filtered = allMangas.filter(m => m.titulo.toLowerCase().includes(term));
                        renderGrid(filtered);
                    });
                }
            } catch (err) { console.error("Error cargando navbar:", err); }
        }

        // 2. CARGAR DATOS
        async function loadData() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (data) {
                allMangas = data;
                renderHero(data);
                renderGrid(data);
                
                new Swiper('#hero-slider', {
                    loop: true,
                    autoplay: { delay: 5000 },
                    pagination: { el: '.swiper-pagination', clickable: true },
                    effect: 'fade',
                    fadeEffect: { crossFade: true }
                });
            }
        }

        function renderHero(mangas) {
            const wrapper = document.getElementById('hero-wrapper');
            wrapper.innerHTML = mangas.map(m => {
                // CORRECCIÓN: Notación de corchetes para nombre con espacios
                const banner = m['URL del banner'] || m.portada_url;
                
                return `
                <div class="swiper-slide" style="background: url('${banner}') center/cover no-repeat;">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <img src="${m.portada_url}" class="w-48 rounded-2xl shadow-2xl hidden md:block border border-white/10 aspect-[3/4] object-cover">
                        <div>
                            <h2 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter mb-4 leading-none text-white">${m.titulo}</h2>
                            <p class="text-zinc-300 text-sm md:text-base max-w-xl mb-8 line-clamp-3 opacity-80">${m.sinopsis || 'Sin descripción disponible.'}</p>
                            <a href="detalles.html?id=${m.id}" class="inline-flex items-center gap-3 bg-[#ff6700] px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-[#e65c00] transition-all hover:scale-105 shadow-xl shadow-orange-900/20">
                                <i class="fas fa-play"></i> Ver Detalles
                            </a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderGrid(mangas) {
            const grid = document.getElementById('manga-grid');
            if (mangas.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-zinc-600 py-10 italic">No se encontraron resultados...</p>`;
                return;
            }
            grid.innerHTML = mangas.map(m => `
                <a href="detalles.html?id=${m.id}" class="manga-card group">
                    <div class="relative overflow-hidden aspect-[3/4]">
                        <img src="${m.portada_url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                             <span class="bg-[#ff6700] p-3 rounded-full shadow-lg"><i class="fas fa-plus text-white text-xs"></i></span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-black text-[10px] uppercase truncate text-zinc-200 tracking-wider group-hover:text-[#ff6700] transition-colors">${m.titulo}</h3>
                    </div>
                </a>
            `).join('');
        }

        loadNavbar();
        loadData();
    </script>
</body>
</html>
