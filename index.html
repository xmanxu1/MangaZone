<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MangaZone - Actualizado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #ff6700; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        nav { width: 240px; background: #12151c; border-right: 1px solid #2d333b; padding: 20px; }
        main { flex: 1; overflow-y: auto; }
        
        .hero {
            height: 480px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
            transition: background-image 0.5s ease-in-out;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg) 30%, rgba(0,0,0,0.4) 100%);
        }
        .hero-content { position: relative; z-index: 2; display: flex; gap: 35px; }
        .hero-poster { width: 210px; height: 300px; border-radius: 10px; object-fit: cover; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .btn-leer { background: var(--accent); color: white; padding: 15px 35px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <nav><h2 style="color:var(--accent)">MangaZone</h2></nav>
    <main id="main-content"></main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargar() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error || !data.length) return;

            const m = data[0];
            const main = document.getElementById('main-content');
            
            // EL TRUCO: Añadimos un número aleatorio al final del link para forzar el cambio
            const linkImagen = m.portada_url;
            const linkConFuerza = linkImagen + "?t=" + new Date().getTime();
            const linkLectura = m['URL del banner'] || '#';

            main.innerHTML = `
                <div class="hero" style="background-image: url('${linkConFuerza}')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <img src="${linkConFuerza}" class="hero-poster">
                        <div>
                            <h1 style="font-size: 3.5rem; margin:0;">${m['título'] || m['titulo']}</h1>
                            <p style="color: #9aa1a9; max-width: 550px; font-size: 1.1rem; margin-top: 20px;">${m.sinopsis || ''}</p>
                            <a href="${linkLectura}" target="_blank" class="btn-leer">LEER AHORA</a>
                        </div>
                    </div>
                </div>
            `;
        }
        cargar();
    </script>
</body>
</html>
