<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fondo: #0b0e14;
            --tarjeta: #1a1d24;
            --azul: #3b82f6;
            --texto: #ffffff;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            color: var(--azul);
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 0;
        }

        #contenedor-mangas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .manga-card {
            background: var(--tarjeta);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d333b;
            transition: transform 0.3s ease;
        }

        .manga-card:hover {
            transform: translateY(-10px);
            border-color: var(--azul);
        }

        .manga-card img {
            width: 100%;
            height: 350px; /* Un poco más alto para que quepa bien la portada */
            object-fit: cover;
        }

        .manga-info {
            padding: 15px;
        }

        .manga-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
            color: var(--azul);
        }

        .manga-info p {
            font-size: 0.9rem;
            color: #9aa1a9;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>MANGAZONE</h1>
    </header>

    <div id="contenedor-mangas"></div>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMangas() {
            const lista = document.getElementById('contenedor-mangas');

            try {
                const { data: mangas, error } = await _supabase
                    .from('Mangas')
                    .select('*');

                if (error) throw error;

                lista.innerHTML = '';

                mangas.forEach(manga => {
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    
                    // IMPORTANTE: manga['título'] con acento para que coincida con Supabase
                    card.innerHTML = `
                        <img src="${manga.portada_url}" alt="${manga['título']}">
                        <div class="manga-info">
                            <h3>${manga['título'] || 'Sin título'}</h3>
                            <p>${manga.sinopsis || 'Sin descripción.'}</p>
                        </div>
                    `;
                    
                    lista.appendChild(card);
                });

            } catch (err) {
                console.error(err);
            }
        }

        cargarMangas();
    </script>
</body>
</html>
