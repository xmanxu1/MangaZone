<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone - Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #1a1d24;
            --text-color: #ffffff;
            --accent-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        #contenedor-mangas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .manga-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid #2d333b;
        }

        .manga-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--accent-color);
        }

        .manga-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .manga-info {
            padding: 15px;
        }

        .manga-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .manga-info p {
            font-size: 0.85rem;
            color: #9aa1a9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>MangaZone</h1>
    
    <div id="contenedor-mangas">
        <div class="loading">Cargando biblioteca desde Supabase...</div>
    </div>

    <script>
        // Configuración de tu conexión
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarCatalogo() {
            const contenedor = document.getElementById('contenedor-mangas');
            
            try {
                // Consultamos la tabla 'Mangas' que creaste
                const { data: mangas, error } = await _supabase
                    .from('Mangas')
                    .select('*');

                if (error) throw error;

                // Limpiamos el mensaje de carga
                contenedor.innerHTML = '';

                // Generamos las tarjetas para cada manga
                mangas.forEach(manga => {
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    card.innerHTML = `
                        <img src="${manga.portada_url}" alt="${manga.titulo}">
                        <div class="manga-info">
                            <h3>${manga.titulo}</h3>
                            <p>${manga.sinopsis || 'Sin descripción disponible.'}</p>
                        </div>
                    `;
                    
                    // Al hacer clic, podrías enviar al usuario a ver el manga
                    card.onclick = () => alert('Abriendo: ' + manga.titulo);
                    
                    contenedor.appendChild(card);
                });

            } catch (err) {
                console.error('Error:', err);
                contenedor.innerHTML = '<p style="color:red; text-align:center;">Error al conectar con la base de datos.</p>';
            }
        }

        // Ejecutar al cargar la página
        cargarCatalogo();
    </script>
</body>
</html>
