<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #12151c;
            --accent: #ff6700;
            --text: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        nav {
            width: 240px;
            background-color: var(--sidebar);
            border-right: 1px solid #2d333b;
            padding: 20px;
        }

        .logo { font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; }
        .logo span { color: var(--accent); }

        main { flex: 1; overflow-y: auto; }

        /* EL BANNER - CORREGIDO */
        .hero {
            height: 480px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg) 30%, rgba(0,0,0,0.4) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 35px;
        }

        .hero-poster {
            width: 210px;
            height: 300px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        .hero-info h2 { font-size: 3.5rem; margin: 0; }
        .hero-info p { color: var(--text-dim); margin: 20px 0; max-width: 500px; }

        .btn-orange {
            background: var(--accent);
            color: white;
            padding: 15px 35px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Manga<span>Zone</span></div>
    </nav>

    <main id="main-content">
        </main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargar() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error || !data) return;

            // Tomamos el primer manga
            const m = data[0];
            
            // BUSCAMOS LOS LINKS EN TODAS LAS COLUMNAS POSIBLES
            const imgUrl = m.portada_url || m['URL del banner'] || '';
            const linkLectura = m['URL del banner'] || '#';
            const titulo = m['título'] || m['titulo'] || 'Cargando...';

            document.getElementById('main-content').innerHTML = `
                <div class="hero" style="background-image: url('${imgUrl}')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <img src="${imgUrl}" class="hero-poster">
                        <div class="hero-info">
                            <h2>${titulo}</h2>
                            <p>${m.sinopsis || 'Sin descripción'}</p>
                            <a href="${linkLectura}" class="btn-orange">LEER AHORA</a>
                        </div>
                    </div>
                </div>
            `;
        }
        cargar();
    </script>
</body>
</html>
