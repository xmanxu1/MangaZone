<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #12151c;
            --accent: #ff6700;
            --text: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        nav {
            width: 240px;
            background-color: var(--sidebar);
            border-right: 1px solid #2d333b;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo { font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; }
        .logo span { color: var(--accent); }

        /* CONTENIDO */
        main { flex: 1; overflow-y: auto; }

        .hero {
            height: 500px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg) 25%, rgba(11,14,20,0.3) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .hero-poster {
            width: 220px;
            height: 310px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .hero-info h1 { font-size: 3.5rem; margin: 0; }
        .hero-info p { color: var(--text-dim); max-width: 550px; line-height: 1.6; margin: 20px 0; }

        /* BOTÓN DE LEER */
        .btn-leer {
            background-color: var(--accent);
            color: white;
            padding: 16px 45px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-leer:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 103, 0, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Manga<span>Zone</span></div>
    </nav>

    <main id="main-content">
        </main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarPagina() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error || !data.length) return;

            const m = data[0]; // Primer manga
            const main = document.getElementById('main-content');

            // --- CONFIGURACIÓN DE COLUMNAS ---
            const titulo = m.titulo || m['título'];
            const portada = m.portada_url;
            const banner = m.banner_url || m.portada_url;
            const sinopsis = m.sinopsis || '';
            
            // IMPORTANTE: Aquí buscamos el link de lectura. 
            // Si en tu Supabase la columna se llama "URL del banner", cámbialo abajo:
            const linkLectura = m['URL del banner'] || '#'; 

            main.innerHTML = `
                <div class="hero" style="background-image: url('${banner}')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <img src="${portada}" class="hero-poster">
                        <div class="hero-info">
                            <h1>${titulo}</h1>
                            <p>${sinopsis}</p>
                            <a href="${linkLectura}" target="_blank" class="btn-leer">LEER AHORA</a>
                        </div>
                    </div>
                </div>
            `;
        }

        cargarPagina();
    </script>
</body>
</html>
