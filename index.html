<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* RECUPERANDO EL DISEÑO DEL CARRUSEL (RECTÁNGULO SUPERIOR) */
        .swiper-hero { 
            width: 100%; 
            height: 60vh; /* Altura original */
            position: relative; 
        }
        
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #050505 15%, transparent 100%),
                        linear-gradient(to right, #050505 25%, transparent 85%);
            z-index: 1;
        }
        
        .hero-content { 
            position: relative; 
            z-index: 2; 
            padding: 0 8%; 
            display: flex; 
            align-items: center; 
            gap: 40px; 
            height: 100%; 
        }

        /* RECUPERANDO EL DISEÑO DE LAS TARJETAS (GRID) */
        .manga-card {
            background: #111; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.3s ease;
        }
        .manga-card:hover { 
            transform: translateY(-5px); 
            border-color: #ff6700; 
            box-shadow: 0 10px 20px rgba(255, 103, 0, 0.2);
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="swiper swiper-hero" id="hero-slider">
        <div class="swiper-wrapper" id="hero-wrapper">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <main class="max-w-[1400px] mx-auto px-[8%] py-16">
        <h2 class="text-xs text-zinc-600 font-bold uppercase tracking-widest mb-10">Biblioteca Completa</h2>
        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
            </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        let allMangas = [];

        // --- 1. CARGAR NAVBAR Y ACTIVAR BUSCADOR (CORREGIDO) ---
        async function loadNavbar() {
            const res = await fetch('navbar.html');
            const html = await res.text();
            document.getElementById('navbar-placeholder').innerHTML = html;
            
            // Activar buscador DESPUÉS de cargar el HTML
            const searchInput = document.getElementById('searchInput');
            if(searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allMangas.filter(m => m.titulo.toLowerCase().includes(term));
                    renderGrid(filtered);
                });
            }
        }

        // --- 2. CARGAR DATOS DE SUPABASE ---
        async function loadData() {
            const { data } = await _supabase.from('Mangas').select('*');
            if (data) {
                allMangas = data;
                renderHero(data);
                renderGrid(data);
                
                // Inicializar Swiper
                new Swiper('#hero-slider', {
                    loop: true,
                    autoplay: { delay: 5000 },
                    pagination: { el: '.swiper-pagination', clickable: true },
                    effect: 'fade',
                    fadeEffect: { crossFade: true }
                });
            }
        }

        function renderHero(mangas) {
            const wrapper = document.getElementById('hero-wrapper');
            mangas.forEach(m => {
                wrapper.innerHTML += `
                    <div class="swiper-slide" style="background-image: url('${m.banner_url}'); background-size: cover; background-position: center;">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <img src="${m.portada_url}" class="w-44 rounded-xl shadow-2xl hidden md:block border border-white/10">
                            <div>
                                <h2 class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4 leading-none">${m.titulo}</h2>
                                <p class="text-zinc-400 text-sm max-w-xl mb-8 line-clamp-3">${m.sinopsis || ''}</p>
                                <a href="detalles.html?id=${m.id}" class="inline-block bg-[#ff6700] px-8 py-3 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-[#ff4500] transition">Ver Detalles</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderGrid(mangas) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = mangas.map(m => `
                <a href="detalles.html?id=${m.id}" class="manga-card">
                    <img src="${m.portada_url}" class="w-full h-72 object-cover">
                    <div class="p-4 text-center">
                        <h3 class="font-bold text-xs uppercase truncate text-zinc-200">${m.titulo}</h3>
                    </div>
                </a>
            `).join('');
        }

        // Ejecutar
        loadNavbar();
        loadData();
    </script>
</body>
</html>
