<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Biblioteca Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
        }
        
        /* Estilos personalizados para el carrusel (Swiper) */
        .swiper-hero {
            width: 100%;
            height: 60vh; /* Altura del panel principal */
        }
        
        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center 20%;
            position: relative;
        }

        /* Degradado de fondo para legibilidad (como MangaDex) */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #050505 15%, transparent 100%);
            z-index: 1;
        }

        .hero-content-wrapper {
            position: relative;
            z-index: 2;
            padding: 0 8%;
            width: 100%;
        }

        /* Tarjeta de portada flotante */
        .poster-card {
            width: 180px;
            height: 260px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-action {
            background: #ff6700;
            padding: 10px 30px;
            border-radius: 6px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-action:hover {
            transform: scale(1.05);
            background: #ff4500;
            box-shadow: 0 0 15px rgba(255, 103, 0, 0.4);
        }
    </style>
</head>
<body>

    <nav class="p-6 px-[8%] border-b border-zinc-900 bg-[#0a0a0a]">
        <h1 class="text-3xl font-black text-[#ff6700] uppercase tracking-tighter">MangaZone</h1>
    </nav>

    <div class="swiper swiper-hero" id="hero-slider">
        <div class="swiper-wrapper" id="hero-wrapper">
            <div class="swiper-slide text-orange-500 font-bold animate-pulse">Cargando biblioteca...</div>
        </div>
        
        <div class="swiper-pagination"></div>
    </div>

    <main class="p-10 px-[8%]">
        <h2 class="text-xs text-zinc-600 font-bold uppercase tracking-widest mb-6">Últimas Actualizaciones</h2>
        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'
        
        // Configuración de Supabase
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function initMangaZone() {
            // Solicitamos TODOS los mangas a la base de datos
            const { data, error } = await _supabase.from('Mangas').select('*');

            if (data) {
                const heroWrapper = document.getElementById('hero-wrapper');
                const gridWrapper = document.getElementById('manga-grid');
                
                heroWrapper.innerHTML = '';
                gridWrapper.innerHTML = '';

                data.forEach((m, index) => {
                    // 1. LLENAR EL CARRUSEL SUPERIOR
                    heroWrapper.innerHTML += `
                        <div class="swiper-slide" style="background-image: url('${m.banner_url}')">
                            <div class="hero-overlay"></div>
                            
                            <div class="hero-content-wrapper flex flex-col md:flex-row items-center gap-10">
                                <img src="${m.portada_url}" class="poster-card flex-shrink-0">
                                
                                <div class="text-center md:text-left flex-1 pt-12 md:pt-0">
                                    <h2 class="text-5xl md:text-6xl font-black uppercase tracking-tighter mb-3 leading-none">${m.titulo}</h2>
                                    <p class="text-zinc-400 text-sm max-w-xl mb-6 leading-relaxed line-clamp-3">${m.sinopsis || 'Sin descripción.'}</p>
                                    
                                    <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-action text-white no-underline inline-block">
                                        LEER AHORA
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;

                    // 2. LLENAR LA CUADRÍCULA INFERIOR (Opcional, como el catálogo normal)
                    // (Omitimos este bloque si solo quieres el carrusel arriba)
                });

                // INICIALIZAR SWIPER.JS (con rotación de 5 segundos)
                new Swiper('#hero-slider', {
                    loop: true,               // Infinito
                    spaceBetween: 0,
                    effect: 'fade',           // Efecto de desvanecimiento suave (fade)
                    fadeEffect: { crossFade: true },
                    autoplay: {
                        delay: 5000,          // 5 segundos
                        disableOnInteraction: false, // Sigue rotando aunque el usuario interactúe
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,      // Se puede hacer clic en los puntos
                    },
                });
            }
        }
        initMangaZone();
    </script>
</body>
</html>
