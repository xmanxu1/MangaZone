<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* BANNER CON ALTURA CORREGIDA */
        .hero-section {
            position: relative;
            height: 55vh; 
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        #hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center 20%;
            z-index: 1;
        }

        /* DEGRADADO INMERSIVO */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #050505 15%, transparent 80%),
                        linear-gradient(to top, #050505 0%, transparent 40%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 0 8%;
            width: 100%;
        }

        .manga-card-hero {
            width: 180px; 
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-leer {
            background: #ff6700;
            padding: 10px 35px;
            border-radius: 6px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            cursor: pointer;
        }

        .btn-leer:hover {
            transform: scale(1.05);
            background: #ff4500;
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.5);
        }

        .neon-logo {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            top: 25px; left: 8%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="neon-logo text-xl">MangaZone</div>

    <div id="hero-container">
        <div class="flex items-center justify-center h-[55vh]">
            <p class="text-orange-500 animate-pulse font-bold">CARGANDO BIBLIOTECA...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function load() {
            // Buscamos el manga en Supabase
            const { data, error } = await _supabase.from('Mangas').select('*').limit(1)

            if (error) {
                console.error("Error:", error);
                return;
            }

            if (data && data.length > 0) {
                const m = data[0];
                const container = document.getElementById('hero-container');

                container.innerHTML = `
                    <section class="hero-section">
                        <div id="hero-bg" style="background-image: url('${m.banner_url}')"></div>
                        <div class="hero-overlay"></div>
                        
                        <div class="hero-content flex flex-col md:flex-row items-center gap-10">
                            <img src="${m.portada_url}" class="manga-card-hero">
                            
                            <div class="text-center md:text-left">
                                <h2 class="text-5xl md:text-6xl font-black mb-3 uppercase tracking-tighter">${m.titulo}</h2>
                                <p class="text-zinc-400 text-sm max-w-xl mb-6 leading-relaxed">
                                    ${m.sinopsis}
                                </p>
                                <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-leer text-white no-underline">
                                    LEER AHORA
                                </a>
                            </div>
                        </div>
                    </section>
                `;
            }
        }
        load();
    </script>
</body>
</html>
