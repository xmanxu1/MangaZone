<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Contenedor del Banner con degradado */
        .hero-banner {
            position: relative;
            height: 60vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        /* Degradado para que el texto se lea bien y se funda con el negro */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #0a0a0c 20%, transparent 60%),
                        linear-gradient(to top, #0a0a0c 10%, transparent 40%);
        }

        .hero-content { position: relative; z-index: 10; max-width: 600px; }

        .manga-cover-main {
            width: 200px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-leer-main {
            background-color: #ff6700;
            color: white;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .btn-leer-main:hover {
            background-color: #ff4500;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.4);
        }

        .neon-brand {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="p-6 absolute top-0 w-full z-50">
        <h1 class="neon-brand text-xl">MangaZone</h1>
    </header>

    <div id="hero-container">
        </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'TU_ANON_KEY_AQUÍ' // <--- PON TU CLAVE ANON AQUÍ
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function init() {
            // Buscamos el primer manga de tu tabla
            const { data, error } = await _supabase.from('Mangas').select('*').limit(1)
            
            if (error || !data.length) return;
            const m = data[0];

            document.getElementById('hero-container').innerHTML = `
                <section class="hero-banner" style="background-image: url('${m.banner_url}')">
                    <div class="hero-overlay"></div>
                    
                    <div class="hero-content flex flex-col md:flex-row gap-10 items-center">
                        <img src="${m.portada_url}" class="manga-cover-main">
                        
                        <div class="text-center md:text-left">
                            <h2 class="text-5xl font-black mb-4">${m.titulo}</h2>
                            <p class="text-zinc-400 text-sm mb-8 leading-relaxed">
                                ${m.sinopsis || 'Sin descripción disponible.'}
                            </p>
                            <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-leer-main">
                                LEER AHORA
                            </a>
                        </div>
                    </div>
                </section>
            `;
        }
        init();
    </script>
</body>
</html>
