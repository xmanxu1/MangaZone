<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .swiper-hero { width: 100%; height: 70vh; position: relative; }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #050505 10%, transparent 100%),
                        linear-gradient(to right, #050505 20%, transparent 80%);
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; padding: 0 8%; display: flex; align-items: center; gap: 30px; height: 100%; }
        .manga-card {
            background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s ease;
        }
        .manga-card:hover { transform: translateY(-5px); border-color: #ff6700; }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="swiper swiper-hero" id="hero-slider">
        <div class="swiper-wrapper" id="hero-wrapper"></div>
        <div class="swiper-pagination"></div>
    </div>

    <main class="max-w-[1400px] mx-auto px-[5%] py-12">
        <h2 class="text-xs text-zinc-600 font-bold uppercase tracking-widest mb-8">Biblioteca Completa</h2>
        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        let allMangas = [];

        // --- 1. CARGAR NAVBAR Y ACTIVAR BUSCADOR ---
        async function loadNavbar() {
            const res = await fetch('navbar.html');
            const html = await res.text();
            document.getElementById('navbar-placeholder').innerHTML = html;
            
            // Una vez cargada la navbar, activamos el buscador
            const searchInput = document.getElementById('searchInput');
            if(searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allMangas.filter(m => m.titulo.toLowerCase().includes(term));
                    renderGrid(filtered);
                });
            }
        }

        // --- 2. CARGAR CONTENIDO DE SUPABASE ---
        async function loadData() {
            const { data } = await _supabase.from('Mangas').select('*');
            if (data) {
                allMangas = data;
                renderHero(data);
                renderGrid(data);
                
                new Swiper('#hero-slider', {
                    loop: true,
                    autoplay: { delay: 5000 },
                    pagination: { el: '.swiper-pagination', clickable: true },
                    effect: 'fade'
                });
            }
        }

        function renderHero(mangas) {
            const wrapper = document.getElementById('hero-wrapper');
            mangas.forEach(m => {
                wrapper.innerHTML += `
                    <div class="swiper-slide" style="background-image: url('${m.banner_url}')">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <img src="${m.portada_url}" class="w-48 rounded-lg shadow-2xl hidden md:block">
                            <div>
                                <h2 class="text-6xl font-black uppercase mb-4">${m.titulo}</h2>
                                <a href="detalles.html?id=${m.id}" class="bg-[#ff6700] px-8 py-3 rounded-lg font-bold text-xs uppercase">Ver Detalles</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderGrid(mangas) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = mangas.map(m => `
                <a href="detalles.html?id=${m.id}" class="manga-card">
                    <img src="${m.portada_url}" class="w-full h-64 object-cover">
                    <div class="p-4 text-center">
                        <h3 class="font-bold text-xs uppercase truncate">${m.titulo}</h3>
                    </div>
                </a>
            `).join('');
        }

        // Ejecutar todo
        loadNavbar();
        loadData();
    </script>
</body>
</html>
