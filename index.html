<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
        }
        
        /* Contenedor principal en cuadrícula */
        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px 8%;
        }

        /* Estilo de cada tarjeta de manga */
        .manga-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #222;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .manga-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 103, 0, 0.3);
            border-color: #ff6700;
        }

        .manga-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .manga-info {
            padding: 15px;
        }

        .manga-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .neon-logo {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 25px 8% 0;
            display: block;
            font-size: 1.5rem;
        }

        .section-title {
            padding: 20px 8% 0;
            color: #555;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="neon-logo">MangaZone</div>
    <div class="section-title">Tu Biblioteca Personal</div>

    <div id="manga-container" class="manga-grid">
        <div class="text-orange-500 animate-pulse">Cargando biblioteca...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function load() {
            // ELIMINAMOS EL .limit(1) para traer TODO
            const { data, error } = await _supabase
                .from('Mangas')
                .select('*')
                .order('titulo', { ascending: true }); // Opcional: ordenar por nombre

            if (error) {
                console.error("Error cargando datos:", error);
                return;
            }

            if (data) {
                const container = document.getElementById('manga-container');
                container.innerHTML = ''; // Limpiar el "Cargando"

                data.forEach(m => {
                    // Creamos una tarjeta por cada fila de la tabla
                    container.innerHTML += `
                        <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="manga-card">
                            <img src="${m.portada_url}" alt="${m.titulo}">
                            <div class="manga-info">
                                <div class="manga-title">${m.titulo}</div>
                                <p class="text-zinc-500 text-xs line-clamp-2">${m.sinopsis || 'Sin descripción'}</p>
                            </div>
                        </a>
                    `;
                });
            }
        }
        load();
    </script>
</body>
</html>
