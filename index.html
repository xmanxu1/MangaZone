<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Biblioteca Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fondo: #0b0e14;
            --tarjeta: #1a1d24;
            --azul: #3b82f6;
            --texto: #ffffff;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            color: var(--azul);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        #contenedor-mangas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .manga-card {
            background: var(--tarjeta);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d333b;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .manga-card:hover {
            transform: translateY(-10px);
            border-color: var(--azul);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .manga-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .manga-info {
            padding: 15px;
        }

        .manga-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--azul);
        }

        .manga-info p {
            font-size: 0.85rem;
            color: #9aa1a9;
            line-height: 1.4;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>MangaZone</h1>
    </header>

    <div id="contenedor-mangas">
        <div class="loading">Conectando con la base de datos...</div>
    </div>

    <script>
        // Tus credenciales de conexión
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMangas() {
            const lista = document.getElementById('contenedor-mangas');

            try {
                // Consultamos tu tabla 'Mangas'
                const { data: mangas, error } = await _supabase
                    .from('Mangas')
                    .select('*');

                if (error) throw error;

                // Limpiamos el mensaje de carga
                lista.innerHTML = '';

                if (mangas.length === 0) {
                    lista.innerHTML = '<div class="loading">No hay mangas en la base de datos.</div>';
                    return;
                }

                // Dibujamos cada manga
                mangas.forEach(manga => {
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    
                    // Ajustamos nombres de columnas según tus capturas
                    card.innerHTML = `
                        <img src="${manga.portada_url}" alt="${manga.título}">
                        <div class="manga-info">
                            <h3>${manga.título || 'Sin título'}</h3>
                            <p>${manga.sinopsis || 'Sin descripción disponible.'}</p>
                        </div>
                    `;
                    
                    lista.appendChild(card);
                });

            } catch (err) {
                console.error('Error de Supabase:', err);
                lista.innerHTML = '<div class="loading" style="color:red;">Error al cargar los datos. Revisa la consola (F12).</div>';
            }
        }

        // Iniciar la carga
        cargarMangas();
    </script>
</body>
</html>
