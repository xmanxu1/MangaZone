<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Fondo degradado animado */
        body {
            background: linear-gradient(-45deg, #0b0e14, #1a1d24, #0b0e14);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header h1 {
            text-align: center;
            color: #3b82f6;
            font-size: 3rem;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            margin-bottom: 40px;
        }

        #contenedor-mangas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .manga-card {
            background: rgba(26, 29, 36, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .manga-card:hover {
            transform: scale(1.05);
            border-color: #3b82f6;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .manga-card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        /* Título con sombra para que resalte */
        .info h3 {
            margin: 0 0 10px 0;
            color: #3b82f6;
            font-size: 1.4rem;
            text-transform: capitalize;
        }

        /* Estilo de los botones */
        .btn-leer {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
        }

        .btn-leer:hover {
            background: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.7);
        }
    </style>
</head>
<body>

    <header>
        <h1>MANGAZONE</h1>
    </header>

    <div id="contenedor-mangas"></div>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargar() {
            // Intentamos leer la tabla 'Mangas'
            const { data, error } = await _supabase.from('Mangas').select('*');
            
            if (error) {
                console.error("Error:", error);
                return;
            }

            const lista = document.getElementById('contenedor-mangas');
            lista.innerHTML = '';

            data.forEach(manga => {
                // AQUÍ ESTÁ EL TRUCO: Buscamos 'título' con acento o sin él por si acaso
                const tituloReal = manga['título'] || manga['titulo'] || 'Sin título';
                
                lista.innerHTML += `
                    <div class="manga-card">
                        <img src="${manga.portada_url}" alt="${tituloReal}">
                        <div class="info">
                            <h3>${tituloReal}</h3>
                            <button class="btn-leer">Leer Ahora</button>
                        </div>
                    </div>`;
            });
        }
        cargar();
    </script>
</body>
</html>
