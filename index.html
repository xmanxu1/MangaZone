<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 40px 8%;
        }
        .manga-card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #222;
            text-decoration: none;
            color: white;
        }
        .manga-card:hover {
            transform: translateY(-8px);
            border-color: #ff6700;
            box-shadow: 0 10px 20px rgba(255, 103, 0, 0.2);
        }
        .manga-card img { width: 100%; height: 260px; object-fit: cover; }
        .neon-title {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            padding: 30px 8% 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1 class="neon-title">MangaZone</h1>
    <p class="px-[8%] text-zinc-500 text-sm uppercase font-bold tracking-widest">Biblioteca Global</p>

    <div id="manga-container" class="manga-grid">
        <div class="animate-pulse text-orange-500">Conectando con la base de datos...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function load() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (data) {
                const container = document.getElementById('manga-container');
                container.innerHTML = '';
                data.forEach(m => {
                    container.innerHTML += `
                        <a href="detalles.html?id=${m.id}" class="manga-card">
                            <img src="${m.portada_url}" alt="${m.titulo}">
                            <div class="p-3">
                                <h3 class="font-bold text-sm uppercase truncate">${m.titulo}</h3>
                                <span class="text-zinc-600 text-[10px] font-bold">MANGA</span>
                            </div>
                        </a>
                    `;
                });
            }
        }
        load();
    </script>
</body>
</html>
