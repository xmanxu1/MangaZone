<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Biblioteca Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #12151c;
            --accent: #ff6700;
            --card-bg: #1a1d24;
            --text: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        nav {
            width: 240px;
            background-color: var(--sidebar);
            border-right: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo { font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; }
        .logo span { color: var(--accent); }
        .nav-link { color: var(--text-dim); text-decoration: none; padding: 12px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover { background: #1a1d24; color: white; }

        /* CONTENIDO PRINCIPAL */
        main { flex: 1; overflow-y: auto; }

        /* HERO BANNER - DISEÑO PRO */
        .hero {
            height: 480px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg) 20%, rgba(11,14,20,0.4) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 35px;
            max-width: 1000px;
        }

        .hero-poster {
            width: 210px;
            height: 300px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        .hero-info h2 { font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-info p { color: var(--text-dim); font-size: 1.1rem; margin: 20px 0; max-width: 600px; }

        .btn-orange {
            background: var(--accent);
            color: white;
            padding: 15px 35px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-orange:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,103,0,0.4); }

        /* CATÁLOGO */
        .container { padding: 40px 60px; }
        .section-title { font-size: 1.5rem; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 15px; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-title { padding: 12px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Manga<span>Zone</span></div>
        <a href="#" class="nav-link">🏠 Inicio</a>
        <a href="#" class="nav-link">🔥 Tendencias</a>
        <a href="#" class="nav-link">📚 Mi Lista</a>
    </nav>

    <main>
        <div id="hero-area"></div>
        <div class="container">
            <div class="section-title">Últimas Actualizaciones</div>
            <div id="manga-grid" class="manga-grid"></div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMangaZone() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error) return;

            const heroArea = document.getElementById('hero-area');
            const grid = document.getElementById('manga-grid');

            if (data.length > 0) {
                // PRIMER MANGA (DESTACADO)
                const m = data[0];
                const tit = m['título'] || m['titulo'];
                const img = m.portada_url; // Imagen de fondo y póster
                const link = m['URL del banner'] || '#'; // Destino del botón naranja

                heroArea.innerHTML = `
                    <div class="hero" style="background-image: url('${img}')">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <img src="${img}" class="hero-poster">
                            <div class="hero-info">
                                <h2>${tit}</h2>
                                <p>${m.sinopsis || ''}</p>
                                <a href="${link}" target="_blank" class="btn-orange">LEER CAPÍTULO 1</a>
                            </div>
                        </div>
                    </div>
                `;

                // TODOS LOS MANGAS EN EL GRID
                data.forEach(manga => {
                    grid.innerHTML += `
                        <a href="${manga['URL del banner'] || '#'}" target="_blank" class="card">
                            <img src="${manga.portada_url}">
                            <div class="card-title">${manga['título'] || manga['titulo']}</div>
                        </a>
                    `;
                });
            }
        }
        cargarMangaZone();
    </script>
</body>
</html>
