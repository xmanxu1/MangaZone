<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-sidebar: #12151c;
            --accent: #ff6700;
            --text-main: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        nav {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid #2d333b;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .logo { font-size: 1.8rem; font-weight: bold; margin-bottom: 40px; }
        .logo span { color: var(--accent); }

        /* CONTENIDO PRINCIPAL */
        main { flex: 1; overflow-y: auto; position: relative; }

        /* HERO BANNER DINÁMICO */
        .hero {
            height: 520px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
            transition: 0.5s;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg-dark) 20%, rgba(11,14,20,0.4) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 45px;
            align-items: center;
        }

        .hero-poster {
            width: 220px;
            height: 320px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-info h1 { font-size: 3.5rem; margin: 0; }
        .hero-info p { color: var(--text-dim); max-width: 580px; line-height: 1.6; margin: 25px 0; font-size: 1.1rem; }

        /* BOTÓN DE LECTURA */
        .btn-leer {
            background-color: var(--accent);
            color: white;
            padding: 16px 45px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-leer:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 103, 0, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Manga<span>Zone</span></div>
        <div style="color: var(--text-dim);">Dashboard</div>
    </nav>

    <main id="app">
        </main>

    <script>
        // 1. Configuración de conexión
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMangaZone() {
            // 2. Traer los datos de la tabla "Mangas"
            const { data, error } = await _supabase.from('Mangas').select('*');
            
            if (error) {
                console.error("Error de Supabase:", error);
                return;
            }

            if (data && data.length > 0) {
                const m = data[0]; // Tomamos el primer manga (Spy x Family)
                const container = document.getElementById('app');

                // 3. Extraer variables (Asegúrate que los nombres coincidan con Supabase)
                const titulo = m.titulo || m['título'];
                const banner = m.banner_url || m.portada_url; // Fondo ancho
                const portada = m.portada_url; // Imagen vertical
                const linkManga = m.leer_url || "#"; // Enlace de lectura
                const sinopsis = m.sinopsis || "No hay descripción disponible.";

                // 4. Inyectar el HTML
                container.innerHTML = `
                    <section class="hero" style="background-image: url('${banner}')">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <img src="${portada}" class="hero-poster" alt="Portada">
                            <div class="hero-info">
                                <h1>${titulo}</h1>
                                <p>${sinopsis}</p>
                                <a href="${linkManga}" target="_blank" class="btn-leer">LEER AHORA</a>
                            </div>
                        </div>
                    </section>
                `;
            } else {
                console.log("No se encontraron datos en la tabla.");
            }
        }

        // Ejecutar al cargar la página
        cargarMangaZone();
    </script>
</body>
</html>
