<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .hero-section {
            position: relative;
            height: 70vh;
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* El Banner de fondo */
        #hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Degradado Inmersivo */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #050505 15%, transparent 100%),
                        linear-gradient(to top, #050505 5%, transparent 50%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 0 5%;
            width: 100%;
            max-width: 1200px;
        }

        .manga-card-main {
            width: 220px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-leer {
            background: #ff6700;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 103, 0, 0.3);
        }

        .btn-leer:hover {
            transform: scale(1.05);
            background: #ff4500;
            box-shadow: 0 0 25px rgba(255, 103, 0, 0.5);
        }

        .neon-logo {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            top: 30px; left: 5%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="neon-logo text-xl">MangaZone</div>

    <div id="hero-container">
        <div class="flex items-center justify-center h-screen">
            <p class="text-orange-500 animate-pulse font-bold tracking-widest">CARGANDO BIBLIOTECA...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // 1. TUS CREDENCIALES (Asegúrate de poner tu clave real aquí)
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'TU_CLAVE_ANON_AQUÍ' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function cargarMangaPrincipal() {
            // Buscamos los datos en la tabla 'Mangas'
            const { data, error } = await _supabase.from('Mangas').select('*').limit(1)

            if (error) {
                console.error("Error:", error);
                return;
            }

            if (data && data.length > 0) {
                const manga = data[0];
                const container = document.getElementById('hero-container');

                container.innerHTML = `
                    <section class="hero-section">
                        <div id="hero-bg" style="background-image: url('${manga.banner_url}')"></div>
                        <div class="hero-overlay"></div>
                        
                        <div class="hero-content flex flex-col md:flex-row items-center gap-12">
                            <img src="${manga.portada_url}" class="manga-card-main">
                            
                            <div class="text-center md:text-left">
                                <h2 class="text-5xl md:text-7xl font-black mb-4 uppercase tracking-tighter">${manga.titulo}</h2>
                                <p class="text-zinc-400 text-sm md:text-base max-w-xl mb-8 leading-relaxed">
                                    ${manga.sinopsis}
                                </p>
                                <a href="lector-manga.html?url=${encodeURIComponent(manga.leer_url)}" class="btn-leer text-white no-underline">
                                    LEER AHORA
                                </a>
                            </div>
                        </div>
                    </section>
                `;
            }
        }

        cargarMangaPrincipal();
    </script>
</body>
</html>
