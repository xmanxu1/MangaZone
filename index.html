<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .hero-section {
            position: relative;
            height: 80vh; /* Un poco más alto para que luzca el banner */
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        #hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Degradado para el efecto inmersivo */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #050505 10%, transparent 80%),
                        linear-gradient(to top, #050505 0%, transparent 50%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 0 8%;
            width: 100%;
        }

        .manga-card-hero {
            width: 240px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-leer {
            background: #ff6700;
            padding: 14px 45px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(255, 103, 0, 0.4);
        }

        .btn-leer:hover {
            transform: scale(1.05);
            background: #ff4500;
            box-shadow: 0 0 30px rgba(255, 103, 0, 0.6);
        }

        .neon-logo {
            color: #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: absolute;
            top: 40px; left: 8%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="neon-logo text-2xl">MangaZone</div>

    <div id="hero-container">
        <div class="flex items-center justify-center h-screen">
            <p class="text-orange-500 animate-pulse font-bold tracking-widest text-xl">CONECTANDO CON LA BASE...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        // USANDO TU LLAVE PROPORCIONADA
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function load() {
            // Buscamos en la tabla 'Mangas' (Asegúrate que se llame así en Supabase)
            const { data, error } = await _supabase.from('Mangas').select('*').limit(1)

            if (error) {
                console.error("Error detectado:", error);
                document.getElementById('hero-container').innerHTML = `<p class="text-red-500 text-center mt-20 font-bold">Error de conexión: ${error.message}</p>`;
                return;
            }

            if (data && data.length > 0) {
                const m = data[0];
                document.getElementById('hero-container').innerHTML = `
                    <section class="hero-section">
                        <div id="hero-bg" style="background-image: url('${m.banner_url}')"></div>
                        <div class="hero-overlay"></div>
                        
                        <div class="hero-content flex flex-col md:flex-row items-center gap-16">
                            <img src="${m.portada_url}" class="manga-card-hero">
                            
                            <div class="text-center md:text-left">
                                <h2 class="text-6xl md:text-8xl font-black mb-6 uppercase tracking-tighter">${m.titulo}</h2>
                                <p class="text-zinc-400 text-base md:text-lg max-w-2xl mb-10 leading-relaxed font-medium">
                                    ${m.sinopsis}
                                </p>
                                <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-leer text-white no-underline text-lg">
                                    LEER AHORA
                                </a>
                            </div>
                        </div>
                    </section>
                `;
            } else {
                document.getElementById('hero-container').innerHTML = `<p class="text-zinc-500 text-center mt-20">No hay mangas en la base de datos.</p>`;
            }
        }

        load();
    </script>
</body>
</html>
