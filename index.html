<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone - Estilo Original</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --sidebar-bg: #12151c;
            --accent: #ff6700; /* Naranja como el de tu imagen */
            --text-main: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Barra Lateral */
        nav {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 20px;
            border-right: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .nav-item {
            color: var(--text-dim);
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: #1a1d24;
            color: white;
        }

        /* Contenido Principal */
        main {
            flex: 1;
            overflow-y: auto;
        }

        /* Hero Banner (Arriba) */
        .hero-banner {
            height: 400px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 50px;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(11,14,20,1) 30%, rgba(11,14,20,0.4) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            display: flex;
            gap: 25px;
        }

        .hero-poster {
            width: 180px;
            height: 260px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .hero-text h2 { font-size: 2.5rem; margin: 0; }
        .hero-text p { color: var(--text-dim); line-height: 1.5; margin: 15px 0; }

        .btn-orange {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-orange:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Sección de Mangas Populares */
        .section-title {
            padding: 20px 50px;
            font-size: 1.2rem;
            border-left: 4px solid var(--accent);
            margin: 20px 0;
        }

        #grid-mangas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 0 50px 50px 50px;
        }

        .manga-card {
            background: #1a1d24;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
        }

        .manga-card:hover { transform: translateY(-5px); }
        .manga-card img { width: 100%; height: 250px; object-fit: cover; }
        .manga-card-info { padding: 10px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MangaZone</div>
        <a href="#" class="nav-item">🏠 Inicio</a>
        <a href="#" class="nav-item">📚 Biblioteca</a>
        <a href="#" class="nav-item">🔥 Tendencias</a>
    </nav>

    <main>
        <div id="hero-area">
            </div>

        <div class="section-title">Mangas Populares</div>
        <div id="grid-mangas"></div>
    </main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMangaDexStyle() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error) return;

            const heroArea = document.getElementById('hero-area');
            const grid = document.getElementById('grid-mangas');

            // 1. Ponemos el primer manga en el Banner Grande (estilo imagen image_818f4d.png)
            const destacado = data[0];
            const tituloDestacado = destacado['título'] || destacado['titulo'];
            const linkDestacado = destacado['URL del banner'] || destacado['banner_url'];

            heroArea.innerHTML = `
                <div class="hero-banner" style="background-image: url('${destacado.portada_url}')">
                    <div class="hero-overlay"></div>
                    <div class="hero-content">
                        <img src="${destacado.portada_url}" class="hero-poster">
                        <div class="hero-text">
                            <h2>${tituloDestacado}</h2>
                            <p>${destacado.sinopsis || ''}</p>
                            <a href="${linkDestacado}" target="_blank" class="btn-orange">Leer Capítulo 1</a>
                        </div>
                    </div>
                </div>
            `;

            // 2. Llenamos el resto en el catálogo de abajo
            data.forEach(manga => {
                grid.innerHTML += `
                    <div class="manga-card">
                        <img src="${manga.portada_url}">
                        <div class="manga-card-info">
                            ${manga['título'] || manga['titulo']}
                        </div>
                    </div>
                `;
            });
        }

        cargarMangaDexStyle();
    </script>
</body>
</html>
