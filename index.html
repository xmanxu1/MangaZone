<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .swiper-hero { width: 100%; height: 50vh; }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #050505 10%, transparent);
        }
        .manga-card {
            background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: 0.3s ease;
        }
        .manga-card:hover { transform: translateY(-5px); border-color: #ff6700; }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="swiper swiper-hero">
        <div class="swiper-wrapper" id="hero-wrapper"></div>
    </div>

    <main class="max-w-[1400px] mx-auto px-[8%] py-10">
        <h2 class="text-zinc-600 font-bold uppercase tracking-widest text-[10px] mb-6">Catálogo de Mangas</h2>
        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        let allMangas = [];

        // 1. CARGAR NAVBAR
        fetch('navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('navbar-placeholder').innerHTML = html;
                initBuscador(); // Activamos el buscador después de cargar la navbar
            });

        // 2. OBTENER DATOS DE SUPABASE
        async function loadData() {
            const { data } = await _supabase.from('Mangas').select('*');
            if (data) {
                allMangas = data;
                renderHero(data);
                renderGrid(data);
                
                new Swiper('.swiper-hero', { loop: true, autoplay: { delay: 5000 }, effect: 'fade' });
            }
        }

        function renderHero(mangas) {
            const hero = document.getElementById('hero-wrapper');
            mangas.forEach(m => {
                hero.innerHTML += `
                    <div class="swiper-slide" style="background-image: url('${m.banner_url}')">
                        <div class="hero-overlay"></div>
                        <div class="relative z-10 px-[8%] pt-20">
                            <h2 class="text-5xl font-black uppercase mb-4">${m.titulo}</h2>
                            <a href="detalles.html?id=${m.id}" class="bg-[#ff6700] px-6 py-2 rounded font-bold text-xs uppercase">Detalles</a>
                        </div>
                    </div>`;
            });
        }

        function renderGrid(mangas) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = '';
            mangas.forEach(m => {
                grid.innerHTML += `
                    <a href="detalles.html?id=${m.id}" class="manga-card">
                        <img src="${m.portada_url}" class="w-full h-56 object-cover">
                        <div class="p-3 text-center"><h3 class="font-bold text-[11px] uppercase truncate">${m.titulo}</h3></div>
                    </a>`;
            });
        }

        // 3. LÓGICA DEL BUSCADOR (Se activa desde el fetch de la navbar)
        function initBuscador() {
            const input = document.getElementById('searchInput');
            if(input) {
                input.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allMangas.filter(m => m.titulo.toLowerCase().includes(term));
                    renderGrid(filtered); // Filtra solo la cuadrícula
                });
            }
        }

        loadData();
    </script>
</body>
</html>
