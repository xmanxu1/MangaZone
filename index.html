<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        
        /* LA BARRA SUPERIOR QUE TE GUSTABA */
        .navbar-neon {
            background: #0a0a0a;
            border-bottom: 2px solid #ff6700; /* Línea neón inferior */
            box-shadow: 0 4px 20px rgba(255, 103, 0, 0.2);
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 10px #ff6700, 0 0 20px #ff6700;
            font-weight: 900;
            text-transform: uppercase;
        }

        .btn-leer {
            background: linear-gradient(135deg, #ff6700 0%, #ff4500 100%);
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-leer:hover {
            box-shadow: 0 0 25px rgba(255, 103, 0, 0.5);
            transform: translateY(-2px);
        }

        .manga-card {
            background: #111;
            border-radius: 15px;
            border: 1px solid #222;
            overflow: hidden;
            transition: 0.3s;
        }

        .manga-card:hover {
            border-color: #ff6700;
        }
    </style>
</head>
<body>

    <nav class="navbar-neon p-4 mb-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="neon-text text-2xl tracking-tighter">MangaZone</h1>
            <div class="flex gap-6 text-xs font-bold uppercase tracking-widest text-zinc-400">
                <a href="#" class="text-white">Inicio</a>
                <a href="#" class="hover:text-orange-500 transition">Populares</a>
                <a href="#" class="hover:text-orange-500 transition">Mi Lista</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4">
        <h2 class="text-zinc-500 text-xs font-black uppercase tracking-[0.3em] mb-6">Mangas Disponibles</h2>
        
        <div id="manga-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p class="text-orange-500 animate-pulse">Conectando con la base de datos...</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'TU_ANON_KEY_AQUÍ' // <--- PON TU CLAVE AQUÍ
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function render() {
            const { data, error } = await _supabase.from('Mangas').select('*')
            if (error) return console.error(error)

            const container = document.getElementById('manga-list');
            container.innerHTML = '';

            data.forEach(m => {
                container.innerHTML += `
                    <div class="manga-card">
                        <img src="${m.portada_url}" class="w-full h-72 object-cover">
                        <div class="p-4">
                            <h3 class="text-xs font-black uppercase mb-4 truncate">${m.titulo}</h3>
                            <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" 
                               class="btn-leer block text-center py-3 text-[10px] rounded-lg text-white">
                                LEER AHORA
                            </a>
                        </div>
                    </div>
                `;
            });
        }
        render();
    </script>
</body>
</html>
