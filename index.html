<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Tu Biblioteca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #12151c;
            --accent: #ff6700; /* Naranja MangaDex */
            --card-bg: #1a1d24;
            --text: #ffffff;
            --text-dim: #9aa1a9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        nav {
            width: 250px;
            background-color: var(--sidebar);
            border-right: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent); }

        .nav-link {
            color: var(--text-dim);
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: #1a1d24;
            color: white;
        }

        /* CONTENIDO PRINCIPAL */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        /* HERO BANNER (ESTILO MANGADEX) */
        .hero {
            height: 450px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
            background-size: cover;
            background-position: center;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg) 20%, rgba(11,14,20,0.6) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 30px;
            max-width: 900px;
        }

        .hero-poster {
            width: 200px;
            height: 290px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-info h2 {
            font-size: 3rem;
            margin: 0;
            line-height: 1.1;
        }

        .hero-info p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin: 20px 0;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-play {
            background: var(--accent);
            color: white;
            padding: 14px 35px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* GRID DE MANGAS */
        .container {
            padding: 40px 60px;
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .manga-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-body {
            padding: 12px;
        }

        .card-body h4 {
            margin: 0;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Manga<span>Zone</span></div>
        <a href="#" class="nav-link active">🏠 Inicio</a>
        <a href="#" class="nav-link">🔥 Tendencias</a>
        <a href="#" class="nav-link">⭐ Favoritos</a>
        <a href="#" class="nav-link">📅 Recientes</a>
    </nav>

    <main>
        <div id="hero-section">
            </div>

        <div class="container">
            <div class="section-title">Mangas Populares</div>
            <div id="manga-grid" class="manga-grid">
                </div>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co';
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const { data, error } = await _supabase.from('Mangas').select('*');
            if (error) {
                console.error("Error cargando Supabase:", error);
                return;
            }

            const heroArea = document.getElementById('hero-section');
            const grid = document.getElementById('manga-grid');

            if (data && data.length > 0) {
                // 1. CONFIGURAR EL MANGA DESTACADO (EL PRIMERO)
                const main = data[0];
                const tit = main['título'] || main['titulo'] || 'Manga Sin Título';
                const sinop = main.sinopsis || 'No hay descripción disponible para este manga.';
                const link = main['URL del banner'] || main['banner_url'] || '#';
                const img = main.portada_url || 'https://via.placeholder.com/500x700?text=No+Image';

                heroArea.innerHTML = `
                    <div class="hero" style="background-image: url('${img}')">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <img src="${img}" class="hero-poster">
                            <div class="hero-info">
                                <h2>${tit}</h2>
                                <p>${sinop}</p>
                                <a href="${link}" target="_blank" class="btn-play">Leer Capítulo 1</a>
                            </div>
                        </div>
                    </div>
                `;

                // 2. CONFIGURAR EL RESTO DEL CATÁLOGO
                grid.innerHTML = '';
                data.forEach(manga => {
                    grid.innerHTML += `
                        <a href="${manga['URL del banner'] || '#'}" target="_blank" class="card">
                            <img src="${manga.portada_url || 'https://via.placeholder.com/200x300'}" alt="${manga['título']}">
                            <div class="card-body">
                                <h4>${manga['título'] || manga['titulo']}</h4>
                            </div>
                        </a>
                    `;
                });
            }
        }

        init();
    </script>
</body>
</html>
