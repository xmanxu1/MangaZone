<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-['Inter']">

    <div class="max-w-6xl mx-auto p-6">
        <header class="flex flex-col md:flex-row gap-8 items-center py-10">
            <img id="manga-portada" src="" class="w-64 rounded-2xl shadow-2xl border border-white/10">
            <div>
                <h1 id="manga-titulo" class="text-5xl font-black uppercase italic mb-4 italic">Cargando...</h1>
                <p id="manga-desc" class="text-zinc-400 mb-6">Obteniendo información...</p>
                <button class="bg-[#ff6700] px-8 py-3 rounded-xl font-bold uppercase tracking-widest hover:scale-105 transition">Leer Ahora</button>
            </div>
        </header>

        <h2 class="text-xs font-black uppercase tracking-[0.3em] text-zinc-500 mb-6 border-l-4 border-[#ff6700] pl-4">Capítulos Disponibles</h2>
        <div id="lista-capitulos" class="grid gap-3">
            </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('id');

        async function init() {
            if (!mangaId) return;

            // Datos del manga
            const { data: manga } = await _supabase.from('Mangas').select('*').eq('id', mangaId).single();
            if (manga) {
                document.getElementById('manga-titulo').innerText = manga.titulo;
                document.getElementById('manga-portada').src = manga.portada_url;
            }

            // Cargar Capítulos
            const { data: capitulos } = await _supabase
                .from('Capitulos')
                .select('*')
                .eq('manga_id', mangaId)
                .order('numero_capitulo', { ascending: true });

            const container = document.getElementById('lista-capitulos');
            if (capitulos) {
                container.innerHTML = capitulos.map(cap => `
                    <a href="lector-manga.html?mangaId=${mangaId}&cap=${cap.numero_capitulo}&url=${encodeURIComponent(JSON.stringify(cap.leer_url))}" 
                       class="flex items-center justify-between bg-[#111] p-5 rounded-2xl border border-white/5 hover:border-[#ff6700]/50 transition-all">
                        <span class="font-bold uppercase text-sm">Capítulo ${cap.numero_capitulo}</span>
                        <i class="fas fa-play text-[#ff6700]"></i>
                    </a>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
