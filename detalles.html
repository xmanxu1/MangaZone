<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* BANNER GIGANTE CON DEGRADADO */
        .hero-banner {
            height: 50vh;
            width: 100%;
            background-size: cover;
            background-position: center 20%;
            position: relative;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #050505 10%, transparent);
        }

        .main-content {
            position: relative;
            z-index: 10;
            margin-top: -180px;
            padding: 0 8% 50px;
        }

        .poster {
            width: 280px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-leer {
            background: #ff6700;
            color: white;
            padding: 14px 45px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-leer:hover {
            background: #ff4500;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 103, 0, 0.4);
        }

        .capitulo-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        .capitulo-link {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            transition: 0.2s;
            text-decoration: none;
            color: #ccc;
        }
        .capitulo-link:hover {
            background: #1a1a1a;
            color: #ff6700;
        }
    </style>
</head>
<body>

    <div id="manga-detail-container">
        </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function loadManga() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const { data: m, error } = await _supabase
                .from('Mangas')
                .select('*')
                .eq('id', id)
                .single();

            if (m) {
                document.getElementById('manga-detail-container').innerHTML = `
                    <div class="hero-banner" style="background-image: url('${m.banner_url}')"></div>
                    
                    <div class="main-content flex flex-col md:flex-row gap-12">
                        <div class="flex-shrink-0">
                            <img src="${m.portada_url}" class="poster">
                        </div>

                        <div class="flex-1 pt-24">
                            <h1 class="text-6xl font-black uppercase tracking-tighter mb-4">${m.titulo}</h1>
                            <p class="text-zinc-400 text-lg leading-relaxed mb-8 max-w-3xl">${m.sinopsis || 'Sin descripción disponible.'}</p>
                            
                            <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-leer">
                                LEER AHORA
                            </a>

                            <div class="mt-16">
                                <h3 class="text-zinc-500 font-bold uppercase tracking-widest text-sm mb-4">Lista de Capítulos</h3>
                                <div class="capitulo-box">
                                    <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="capitulo-link">
                                        <span class="font-bold">CAPÍTULO 01 - INICIO</span>
                                        <span class="text-xs bg-zinc-800 px-3 py-1 rounded">GRATIS</span>
                                    </a>
                                    <div class="capitulo-link opacity-50 cursor-not-allowed">
                                        <span>CAPÍTULO 02 - PRÓXIMAMENTE</span>
                                        <span class="text-xs">BLOQUEADO</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        loadManga();
    </script>
</body>
</html>
