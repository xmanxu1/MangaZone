<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .hero-banner {
            height: 50vh; width: 100%;
            background-size: cover; background-position: center 20%;
            position: relative;
        }
        .hero-banner::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, #050505 10%, transparent);
        }
        .main-content { position: relative; z-index: 10; margin-top: -180px; padding: 0 8%; }
        .poster {
            width: 280px; border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-leer {
            background: #ff6700; color: white; padding: 14px 45px;
            border-radius: 8px; font-weight: 900; text-transform: uppercase;
            transition: 0.3s; display: inline-block; cursor: pointer;
        }
        .btn-leer:hover { transform: scale(1.05); background: #ff4500; box-shadow: 0 0 25px rgba(255, 103, 0, 0.4); }
        
        /* Estilo de la lista de capítulos */
        .cap-link {
            background: #0a0a0a; border: 1px solid #1a1a1a;
            padding: 15px 20px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; text-decoration: none; color: inherit;
        }
        .cap-link:hover { border-color: #ff6700; background: #111; transform: translateX(5px); }
    </style>
</head>
