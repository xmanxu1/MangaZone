<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* Banner con degradado para legibilidad */
        .hero-section {
            position: relative;
            min-height: 65vh;
            width: 100%;
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: flex-end;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #050505 5%, rgba(5, 5, 5, 0.4) 50%, transparent 100%);
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 8% 60px;
        }

        .poster-shadow {
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-principal {
            background: #ff6700;
            color: white;
            padding: 16px 50px;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(255, 103, 0, 0.2);
            cursor: pointer;
        }
        .btn-principal:hover { transform: scale(1.05); background: #ff4500; }

        .cap-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .cap-card:hover { border-color: #ff6700; background: #111; transform: translateX(10px); }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div id="manga-main-container"></div>

    <div class="max-w-[1400px] mx-auto px-[8%] py-16">
        <h3 class="text-xl font-black uppercase tracking-[0.2em] mb-8 text-zinc-600 flex items-center gap-4">
            <span class="w-10 h-[2px] bg-[#ff6700]"></span> Capítulos Disponibles
        </h3>
        <div id="lista-capitulos" class="grid gap-4"></div>
    </div>

    <div id="comentarios-container" class="max-w-[1400px] mx-auto px-[8%] pb-24"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        // Cargar Navbar (Asegúrate de que navbar.html existe en tu repo)
        fetch('navbar.html').then(res => res.text()).then(html => {
            document.getElementById('navbar-placeholder').innerHTML = html;
        });

        async function loadContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            const { data: m } = await _supabase.from('Mangas').select('*').eq('id', id).single();
            const { data: caps } = await _supabase.from('Capitulos').select('*').eq('manga_id', id).order('numero_capitulo', { ascending: true });

            if (m) {
                let capitulosAMostrar = caps || [];
                
                // Si no hay capítulos en la tabla secundaria, crear uno con la leer_url de la tabla principal
                if (capitulosAMostrar.length === 0 && m.leer_url) {
                    capitulosAMostrar = [{
                        numero_capitulo: 1,
                        titulo_capitulo: "Capítulo Inicial",
                        leer_url: m.leer_url
                    }];
                }

                // URL para el botón principal (usa el primer capítulo detectado)
                const firstLink = capitulosAMostrar.length > 0 ? `lector-manga.html?url=${encodeURIComponent(capitulosAMostrar[0].leer_url)}` : "#";

                document.getElementById('manga-main-container').innerHTML = `
                    <div class="hero-section" style="background-image: url('${m.banner_url}')">
                        <div class="content-overlay flex flex-col md:flex-row gap-12 items-center md:items-end">
                            <img src="${m.portada_url}" class="w-72 rounded-2xl poster-shadow hidden md:block -mb-24">
                            <div class="flex-1 text-center md:text-left">
                                <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4 leading-none">${m.titulo}</h1>
                                <p class="text-zinc-400 text-lg max-w-2xl mb-10 leading-relaxed">${m.sinopsis || ''}</p>
                                <a href="${firstLink}" class="btn-principal">
                                    <i class="fas fa-play mr-2 text-sm"></i> Leer Ahora
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                
                renderList(capitulosAMostrar);
                setupComments(id);
            }
        }

        function renderList(list) {
            const container = document.getElementById('lista-capitulos');
            if (list.length === 0) {
                container.innerHTML = `<p class="text-zinc-700 italic text-center p-10">No hay capítulos disponibles.</p>`;
                return;
            }

            container.innerHTML = list.map(c => `
                <a href="lector-manga.html?url=${encodeURIComponent(c.leer_url)}" class="cap-card group">
                    <div class="flex items-center gap-6">
                        <span class="text-[#ff6700] font-black text-2xl italic">#${c.numero_capitulo}</span>
                        <span class="font-bold text-zinc-200 group-hover:text-white transition text-lg">${c.titulo_capitulo || 'Capítulo ' + c.numero_capitulo}</span>
                    </div>
                    <i class="fas fa-chevron-right text-zinc-800 group-hover:text-[#ff6700] transition"></i>
                </a>
            `).join('');
        }

        async function setupComments(mId) {
            const { data: { user } } = await _supabase.auth.getUser();
            const container = document.getElementById('comentarios-container');
            if (user) {
                container.innerHTML = `
                    <div class="mt-10 bg-[#0a0a0a] p-10 rounded-3xl border border-zinc-900">
                        <h3 class="text-2xl font-black mb-6 uppercase tracking-tight">Comentarios</h3>
                        <textarea id="commentText" class="w-full bg-[#050505] border border-zinc-800 p-5 rounded-2xl text-white outline-none focus:border-[#ff6700] h-32" placeholder="Comenta algo..."></textarea>
                        <button id="sendComment" class="bg-[#ff6700] px-10 py-3 rounded-xl font-black text-xs uppercase mt-4 hover:bg-[#ff4500]">Publicar</button>
                    </div>
                    <div id="lista-comentarios" class="mt-10 space-y-4"></div>`;
                
                document.getElementById('sendComment').onclick = async () => {
                    const val = document.getElementById('commentText').value;
                    if(!val.trim()) return;
                    await _supabase.from('Comentarios').insert([{ user_id: user.id, manga_id: mId, contenido: val, user_email: user.email }]);
                    document.getElementById('commentText').value = '';
                    loadComments(mId);
                };
            } else {
                container.innerHTML = `
                    <div class="mt-10 text-center p-12 bg-zinc-900/10 rounded-3xl border border-dashed border-zinc-800">
                        <p class="text-zinc-500 mb-4 text-lg">Inicia sesión para comentar</p>
                        <a href="login.html" class="text-[#ff6700] font-black uppercase text-sm border-b-2 border-[#ff6700]">Entrar a mi cuenta</a>
                    </div>
                    <div id="lista-comentarios" class="mt-10 space-y-4"></div>`;
            }
            loadComments(mId);
        }

        async function loadComments(mId) {
            const { data: coms } = await _supabase.from('Comentarios').select('*').eq('manga_id', mId).order('created_at', { ascending: false });
            const lista = document.getElementById('lista-comentarios');
            lista.innerHTML = coms?.map(c => `
                <div class="p-6 bg-[#0a0a0a] rounded-2xl border border-zinc-900">
                    <p class="text-zinc-500 text-[10px] font-black uppercase mb-1">${c.user_email.split('@')[0]}</p>
                    <p class="text-zinc-300 leading-relaxed">${c.contenido}</p>
                </div>`).join('') || '';
        }

        loadContent();
    </script>
</body>
</html>
