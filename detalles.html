<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .manga-header { 
            background-size: cover; 
            background-position: center; 
            position: relative; 
            min-height: 550px;
            display: flex;
            align-items: end;
        }
        .manga-header::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(0deg, #050505 10%, rgba(5,5,5,0.7) 100%); 
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center relative z-20">
        <a href="index.html" class="text-[#ff6700] font-black text-2xl uppercase italic tracking-tighter">MangaZone</a>
    </nav>

    <header id="manga-banner" class="manga-header pb-20">
        <div class="max-w-6xl mx-auto px-6 w-full relative z-10 grid md:grid-cols-[280px_1fr] gap-12 items-center">
            <img id="manga-portada" src="" class="w-full rounded-[2.5rem] shadow-2xl border border-white/10 hidden md:block aspect-[3/4] object-cover">
            
            <div>
                <h1 id="manga-titulo" class="text-5xl md:text-7xl font-black uppercase italic mb-4 leading-tight text-white">Cargando...</h1>
                <p id="manga-sinopsis" class="text-zinc-300 text-sm md:text-base leading-relaxed max-w-2xl mb-10 opacity-90">
                    Buscando información...
                </p>
                <button class="bg-[#ff6700] text-white px-12 py-5 rounded-2xl font-black uppercase italic tracking-widest hover:scale-105 transition shadow-2xl shadow-orange-900/40">
                    <i class="fas fa-play mr-3"></i> Leer Ahora
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="h-1 w-10 bg-[#ff6700]"></div>
            <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-zinc-500">Capítulos Disponibles</h2>
        </div>

        <div id="lista-capitulos" class="grid gap-4">
            </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('id');

        async function cargarManga() {
            if (!mangaId) return;

            const { data: manga } = await _supabase.from('Mangas').select('*').eq('id', mangaId).single();

            if (manga) {
                document.getElementById('manga-titulo').innerText = manga.titulo;
                document.getElementById('manga-portada').src = manga.portada_url;
                document.getElementById('manga-sinopsis').innerText = manga.sinopsis || "No hay sinopsis disponible.";
                
                // 1. CORRECCIÓN DEL BANNER (Notación de corchetes para espacios)
                const bannerReal = manga['URL del banner'];
                const header = document.getElementById('manga-banner');
                
                if (bannerReal && bannerReal.trim() !== "") {
                    header.style.backgroundImage = `url('${bannerReal}')`;
                } else {
                    header.style.backgroundImage = `url('${manga.portada_url}')`;
                }
            }

            cargarCapitulos();
        }

        async function cargarCapitulos() {
            const { data: caps } = await _supabase.from('Capitulos').select('*').eq('manga_id', mangaId).order('numero_capitulo', { ascending: true });
            const container = document.getElementById('lista-capitulos');

            if (caps && caps.length > 0) {
                container.innerHTML = caps.map(c => {
                    // 2. CORRECCIÓN DE SEGURIDAD (Convierte el contenido a texto plano para el enlace)
                    // Esto evita el error de los corchetes "[" detectado en Supabase
                    const urlData = typeof c.leer_url === 'string' ? c.leer_url : JSON.stringify(c.leer_url);

                    return `
                    <a href="lector-manga.html?mangaId=${mangaId}&cap=${c.numero_capitulo}&images=${encodeURIComponent(urlData)}" 
                       class="flex items-center justify-between bg-[#0f0f0f] p-6 rounded-[1.5rem] border border-white/5 hover:border-[#ff6700]/30 hover:bg-[#151515] transition-all group">
                        <span class="font-black uppercase tracking-widest text-xs md:text-sm text-zinc-300 group-hover:text-white">Capítulo ${c.numero_capitulo}</span>
                        <i class="fas fa-chevron-right text-zinc-800 group-hover:text-[#ff6700] transition-colors"></i>
                    </a>`;
                }).join('');
            } else {
                container.innerHTML = `<p class="text-center py-10 text-zinc-600 italic uppercase text-xs font-bold">Próximamente más capítulos</p>`;
            }
        }

        cargarManga();
    </script>
</body>
</html>
