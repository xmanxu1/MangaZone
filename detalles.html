<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Animación de entrada suave */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .hero-banner {
            height: 55vh;
            width: 100%;
            background-size: cover;
            background-position: center 20%;
            position: relative;
            transition: transform 0.5s ease;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #050505 5%, transparent 90%);
        }

        .main-content {
            position: relative;
            z-index: 10;
            margin-top: -150px;
            padding: 0 8% 50px;
        }

        .poster {
            width: 280px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s ease;
        }

        .poster:hover {
            transform: scale(1.02);
        }

        .btn-leer {
            background: #ff6700;
            color: white;
            padding: 14px 45px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }

        .btn-leer:hover {
            background: #ff4500;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 103, 0, 0.4);
        }

        .capitulo-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }

        .capitulo-link {
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: #ccc;
        }

        .capitulo-link:hover {
            background: #1a1a1a;
            padding-left: 35px; /* Efecto de deslizamiento al pasar el mouse */
            color: #ff6700;
        }

        /* Skeleton loader para cuando carga */
        .loading-state {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
    </style>
</head>
<body>

    <div id="manga-detail-container">
        <div class="loading-state">
            <div class="text-orange-500 font-bold animate-bounce text-xl">CARGANDO...</div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        async function loadManga() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                window.location.href = 'index.html'; // Si no hay ID, volvemos al inicio
                return;
            }

            const { data: m, error } = await _supabase
                .from('Mangas')
                .select('*')
                .eq('id', id)
                .single();

            if (error) {
                console.error("Error cargando el manga:", error);
                return;
            }

            if (m) {
                // Inyectamos el contenido con la clase fade-in para que aparezca suavemente
                document.getElementById('manga-detail-container').innerHTML = `
                    <div class="hero-banner fade-in" style="background-image: url('${m.banner_url}')"></div>
                    
                    <div class="main-content flex flex-col md:flex-row gap-12 fade-in" style="animation-delay: 0.2s;">
                        <div class="flex-shrink-0">
                            <img src="${m.portada_url}" class="poster" alt="${m.titulo}">
                        </div>

                        <div class="flex-1 pt-12 md:pt-24">
                            <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4 leading-none">${m.titulo}</h1>
                            <div class="flex gap-4 mb-6">
                                <span class="text-[#ff6700] font-bold text-sm tracking-widest uppercase">Manga</span>
                                <span class="text-zinc-500 font-bold text-sm tracking-widest uppercase">Estatus: Activo</span>
                            </div>
                            <p class="text-zinc-400 text-lg leading-relaxed mb-8 max-w-3xl">${m.sinopsis || 'Sin descripción disponible.'}</p>
                            
                            <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="btn-leer">
                                LEER AHORA
                            </a>

                            <div class="mt-16">
                                <h3 class="text-zinc-500 font-bold uppercase tracking-widest text-xs mb-4">Lista de Capítulos</h3>
                                <div class="capitulo-box">
                                    <a href="lector-manga.html?url=${encodeURIComponent(m.leer_url)}" class="capitulo-link">
                                        <div>
                                            <span class="text-[#ff6700] mr-2">01</span>
                                            <span class="font-bold">INICIO DEL VIAJE</span>
                                        </div>
                                        <span class="text-[10px] bg-zinc-800 px-3 py-1 rounded font-black text-white">GRATIS</span>
                                    </a>
                                    <div class="capitulo-link opacity-30 cursor-not-allowed">
                                        <div>
                                            <span class="mr-2">02</span>
                                            <span>PRÓXIMAMENTE</span>
                                        </div>
                                        <span class="text-[10px]">BLOQUEADO</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        loadManga();
    </script>
</body>
</html>
