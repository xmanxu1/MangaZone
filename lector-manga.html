<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; user-select: none; }
        #manga-viewer { display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        .manga-page { max-width: 100%; height: auto; display: block; pointer-events: none; }
        .reader-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid #1a1a1a; padding: 15px; z-index: 1000; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .nav-btn { background: #151515; color: #a1a1aa; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 11px; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-btn:hover:not(.disabled) { background: #202020; color: white; }
        .btn-center { background: #1a1a1a; color: #ff6700; border: 1px solid rgba(255, 103, 0, 0.2); }
        .nav-btn.disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="manga-viewer">
        <div id="loading-status" class="py-20 text-zinc-700 animate-pulse font-black uppercase tracking-widest">Cargando páginas...</div>
    </div>

    <nav class="reader-nav">
        <a href="index.html" class="nav-btn"><i class="fas fa-home"></i></a>
        <button id="prev-cap" class="nav-btn disabled"><i class="fas fa-arrow-left"></i> Anterior</button>
        <button onclick="window.history.back()" class="nav-btn btn-center"><i class="fas fa-list-ul"></i> Capítulos</button>
        <button id="next-cap" class="nav-btn disabled">Siguiente <i class="fas fa-arrow-right"></i></button>
    </nav>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('mangaId');
        const capActual = parseFloat(params.get('cap'));
        const urlRaw = params.get('url');

        async function initLector() {
            const viewer = document.getElementById('manga-viewer');
            
            if (urlRaw) {
                const urls = urlRaw.split(',');
                viewer.innerHTML = urls.map(link => `<img src="${link.trim()}" class="manga-page">`).join('');
            }

            if (mangaId && capActual) {
                checkNavigation();
            }
        }

        async function checkNavigation() {
            // Buscar capítulo SIGUIENTE
            const { data: next } = await _supabase.from('Capitulos')
                .select('*').eq('manga_id', mangaId).eq('numero_capitulo', capActual + 1).single();
            
            if (next) {
                const btn = document.getElementById('next-cap');
                btn.classList.remove('disabled');
                btn.onclick = () => window.location.href = `lector-manga.html?mangaId=${mangaId}&cap=${next.numero_capitulo}&url=${next.leer_url}`;
            }

            // Buscar capítulo ANTERIOR
            const { data: prev } = await _supabase.from('Capitulos')
                .select('*').eq('manga_id', mangaId).eq('numero_capitulo', capActual - 1).single();
            
            if (prev) {
                const btn = document.getElementById('prev-cap');
                btn.classList.remove('disabled');
                btn.onclick = () => window.location.href = `lector-manga.html?mangaId=${mangaId}&cap=${prev.numero_capitulo}&url=${prev.leer_url}`;
            }
        }

        initLector();

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'i' || e.key === 'j') || e.key === 'F12') e.preventDefault();
        });
    </script>
</body>
</html>
