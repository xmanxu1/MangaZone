<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* CONTENEDOR DE LECTURA VERTICAL */
        .manga-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 60px; /* Espacio para la barra superior */
        }

        /* LA CLAVE: EL TAMAÑO DE LA IMAGEN */
        .manga-image {
            display: block;
            width: 100%;           /* Se adapta al ancho del dispositivo */
            max-width: 800px;      /* Límite para que no se pixele en PC */
            height: auto !important; /* FUERZA EL ALTO AUTOMÁTICO PARA NO CORTAR */
            margin: 0 auto;
            object-fit: contain;
        }

        /* Separador negro entre páginas */
        .divider {
            height: 2px;
            width: 100%;
            background: #000;
        }

        /* Barra de navegación */
        .nav-reader {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.9);
            padding: 15px 25px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body>

    <nav class="nav-reader">
        <div class="text-[#ff6700] font-black italic">MANGAZONE</div>
        <div id="display-cap" class="text-[10px] uppercase font-bold tracking-widest text-zinc-400">Capítulo</div>
        <button onclick="window.history.back()" class="text-xs font-bold uppercase hover:text-[#ff6700]">Volver</button>
    </nav>

    <main id="manga-viewer" class="manga-container">
        </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imagesRaw = params.get('images') || params.get('url');
        const capNum = params.get('cap');

        document.getElementById('display-cap').innerText = `Capítulo ${capNum}`;

        function cargarContenido() {
            const viewer = document.getElementById('manga-viewer');
            if (!imagesRaw) return;

            let listaLinks = [];
            const decodedData = decodeURIComponent(imagesRaw);

            try {
                // Caso 1: Es un Array JSON (fila 6 de tu Supabase)
                const parsed = JSON.parse(decodedData);
                listaLinks = Array.isArray(parsed) ? parsed : [parsed];
            } catch (e) {
                // Caso 2: Es un link simple (fila 5 de tu Supabase)
                listaLinks = [decodedData];
            }

            // Renderizar imágenes limpiando caracteres extra como [ ] o " "
            viewer.innerHTML = listaLinks.map(url => {
                const linkLimpio = url.replace(/[\[\]"]/g, "").trim();
                return `
                    <img src="${linkLimpio}" class="manga-image" loading="lazy">
                    <div class="divider"></div>
                `;
            }).join('');
        }

        window.onload = cargarContenido;
    </script>
</body>
</html>
