<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; margin: 0; }
        .neon-logo { color: #fff; text-shadow: 0 0 10px #ff6700, 0 0 20px #ff6700; font-weight: 900; text-transform: uppercase; text-decoration: none; }
        .nav-lector { background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid #222; height: 60px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .manga-wrapper { display: flex; justify-content: center; padding: 20px 0; background: #000; }
        #manga-img { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <nav class="nav-lector px-6">
        <div class="w-full flex justify-between items-center">
            <a href="index.html" class="neon-logo text-lg">MangaZone</a>
            <span class="text-orange-500 font-bold uppercase text-xs">Capítulo 1</span>
            <a href="index.html" class="text-white text-xs border border-zinc-700 px-4 py-1 rounded">CERRAR</a>
        </div>
    </nav>

    <div class="manga-wrapper">
        <img id="manga-img" src="" alt="Cargando página...">
    </div>

    <script>
        // 1. Obtener la URL de la barra de direcciones
        const params = new URLSearchParams(window.location.search);
        const imagenUrl = params.get('url');

        // 2. Si existe la URL, ponerla en la imagen
        if (imagenUrl) {
            const imgElement = document.getElementById('manga-img');
            imgElement.src = decodeURIComponent(imagenUrl);
            
            // Si la imagen falla al cargar, avisar
            imgElement.onerror = function() {
                this.alt = "Error: El enlace de la imagen no es válido o ha expirado.";
            };
        } else {
            document.getElementById('manga-img').alt = "Error: No se recibió ninguna URL.";
        }
    </script>
</body>
</html>
