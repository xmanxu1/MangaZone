<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; margin: 0; }
        .manga-image { width: 100%; max-width: 800px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full bg-black/80 backdrop-blur-md p-4 z-50 flex justify-between items-center border-b border-white/10">
        <a href="index.html" class="text-[#ff6700] font-black uppercase italic">MangaZone</a>
        <div id="info-cap" class="text-xs font-bold uppercase tracking-widest text-zinc-400">Cargando...</div>
        <button onclick="window.history.back()" class="text-white text-xs uppercase font-bold">Volver</button>
    </nav>

    <main id="viewer" class="pt-20 pb-10 px-4">
        </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imagesRaw = decodeURIComponent(params.get('images'));
        const capNum = params.get('cap');

        document.getElementById('info-cap').innerText = `Capítulo ${capNum}`;

        function inicializarLector() {
            const viewer = document.getElementById('viewer');
            let listaFinal = [];

            try {
                // Intentamos convertir el texto en una lista (Array)
                const parsed = JSON.parse(imagesRaw);
                listaFinal = Array.isArray(parsed) ? parsed : [parsed];
            } catch (e) {
                // Si no es un JSON válido (es solo una URL de texto), la metemos en una lista
                listaFinal = [imagesRaw];
            }

            // Renderizar las imágenes
            if (listaFinal.length > 0 && listaFinal[0] !== "null") {
                viewer.innerHTML = listaFinal.map(img => `
                    <img src="${img}" class="manga-image mb-4 shadow-2xl" loading="lazy">
                `).join('');
            } else {
                viewer.innerHTML = `<div class="text-center py-20 text-zinc-600 uppercase font-black">Error: No hay imágenes en este capítulo.</div>`;
            }
        }

        inicializarLector();
    </script>
</body>
</html>
