<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; margin: 0; }
        
        /* LOGO NEÓN NARANJA */
        .neon-logo {
            color: #fff;
            text-shadow: 0 0 10px #ff6700, 0 0 20px #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        /* NAVEGACIÓN SUPERIOR OSCURA */
        .nav-lector {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #222;
            height: 60px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* CONTENEDOR DE LA IMAGEN (SIN BARRAS AZULES) */
        .manga-wrapper {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            background: #000;
        }

        #manga-img {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <nav class="nav-lector px-6">
        <div class="w-full flex justify-between items-center">
            <a href="index.html" class="neon-logo text-lg">MangaZone</a>
            <span class="text-orange-500 font-bold uppercase tracking-widest text-xs">Capítulo 1</span>
            <a href="index.html" class="text-white text-xs border border-zinc-700 px-4 py-1 rounded hover:bg-zinc-800">CERRAR</a>
        </div>
    </nav>

    <div class="manga-wrapper">
        <img id="manga-img" src="" alt="Cargando página...">
    </div>

    <script>
        // Este script agarra el link de la URL (el que le pasó el botón naranja)
        const urlParams = new URLSearchParams(window.location.search);
        const urlFinal = urlParams.get('url');

        if (urlFinal) {
            // Reemplaza la imagen por la que está en Supabase
            document.getElementById('manga-img').src = urlFinal;
        }
    </script>
</body>
</html>
