<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector Inmersivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background: #000; /* Fondo negro puro para máxima inmersión */
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Evita scroll horizontal si la imagen es muy ancha */
        }

        /* CONTENEDOR PRINCIPAL: OCUPA TODO EL ANCHO */
        .full-width-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0; /* Sin paddings laterales */
            margin: 0;
        }

        /* LA CLAVE: IMAGEN A ANCHO COMPLETO */
        .manga-page-full {
            width: 100vw;          /* Ocupa el 100% del ancho de la ventana gráfica */
            max-width: 100%;       /* Asegura que no se estire más allá de su contenedor en layouts complejos */
            height: auto !important; /* Mantiene la proporción original, crucial para no cortar */
            display: block;
            object-fit: cover;     /* Ajusta la imagen para cubrir el área, puede cortar bordes si las proporciones difieren */
            margin: 0;             /* Sin márgenes */
        }

        /* Navegación superior minimalista y superpuesta */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); /* Degradado sutil */
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* Deja pasar los clics a la imagen */
        }

        /* Elementos interactivos de la nav */
        .nav-item { pointer-events: auto; }

        .btn-back {
            background: rgba(17, 17, 17, 0.5);
            backdrop-filter: blur(5px);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .btn-back:hover {
            border-color: #ff6700;
            color: #ff6700;
            background: rgba(17, 17, 17, 0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="top-nav">
        <a href="index.html" class="nav-item text-[#ff6700] font-black text-xl italic tracking-tighter">MZ</a>
        <div id="cap-label" class="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500">
            Capítulo
        </div>
        <button onclick="window.history.back()" class="nav-item btn-back">
            <i class="fas fa-times mr-1"></i> Cerrar
        </button>
    </nav>

    <main id="manga-viewer" class="full-width-viewer">
        <div class="py-40 text-zinc-800 font-black uppercase tracking-widest animate-pulse text-xs">
            Cargando experiencia inmersiva...
        </div>
    </main>

    <script>
        // Obtener parámetros
        const params = new URLSearchParams(window.location.search);
        const imagesData = params.get('images') || params.get('url');
        const capNumber = params.get('cap');

        // Actualizar info
        if (capNumber) {
            document.getElementById('cap-label').innerText = `Capítulo ${capNumber}`;
        }

        function renderizarLectorInmersivo() {
            const viewer = document.getElementById('manga-viewer');
            
            if (!imagesData || imagesData === "null") {
                viewer.innerHTML = `<div class="py-40 text-zinc-700 font-bold uppercase text-xs">Contenido no disponible</div>`;
                return;
            }

            let paginas = [];

            try {
                // Descodificar y parsear
                const decoded = decodeURIComponent(imagesData);
                const parsed = JSON.parse(decoded);
                paginas = Array.isArray(parsed) ? parsed : [parsed];
            } catch (e) {
                // Link directo
                paginas = [decodeURIComponent(imagesData)];
            }

            // Renderizado Full-Width
            viewer.innerHTML = paginas.map(url => {
                // Limpieza de URL
                const cleanUrl = url.replace(/["'\[\]]/g, "").trim();
                
                return `
                    <img src="${cleanUrl}" 
                         class="manga-page-full" 
                         loading="lazy" 
                         alt="Página de Manga Inmersiva">
                `;
            }).join('');
        }

        window.onload = renderizarLectorInmersivo;
    </script>
</body>
</html>
