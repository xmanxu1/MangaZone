<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; user-select: none; }
        #manga-viewer { display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        .manga-page { max-width: 100%; height: auto; display: block; border-bottom: 2px solid #050505; }
        .reader-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); padding: 15px; z-index: 1000; display: flex; justify-content: center; align-items: center; gap: 12px; border-top: 1px solid #1a1a1a; }
        .nav-btn { background: #151515; color: #a1a1aa; padding: 10px 18px; rounded: 8px; font-weight: 700; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .nav-btn:hover:not(.disabled) { background: #202020; color: white; }
        .btn-center { background: #1a1a1a; color: #ff6700; border: 1px solid rgba(255, 103, 0, 0.2); }
        .nav-btn.disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="manga-viewer">
        <div id="loading" class="py-20 text-zinc-700 animate-pulse font-black uppercase tracking-widest text-center">
            Cargando páginas...
        </div>
    </div>

    <nav class="reader-nav">
        <a href="index.html" class="nav-btn"><i class="fas fa-home"></i></a>
        <button id="prev-cap" class="nav-btn disabled"><i class="fas fa-arrow-left"></i> Anterior</button>
        <button onclick="window.history.back()" class="nav-btn btn-center"><i class="fas fa-list-ul"></i> Capítulos</button>
        <button id="next-cap" class="nav-btn disabled">Siguiente <i class="fas fa-arrow-right"></i></button>
    </nav>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('mangaId');
        const capActual = parseFloat(params.get('cap'));
        const urlRaw = params.get('url');

        async function initLector() {
            const viewer = document.getElementById('manga-viewer');
            
            if (urlRaw) {
                // Separamos los links por comas (formato que envía Supabase para arrays)
                const urls = urlRaw.split(',');
                viewer.innerHTML = urls.map(link => {
                    // Limpiamos los caracteres raros como [ ] o " si es que quedan
                    const cleanLink = link.replace(/[\[\]"]/g, "").trim();
                    return `<img src="${cleanLink}" class="manga-page" loading="lazy">`;
                }).join('');
            }

            if (mangaId && capActual) {
                checkNextPrev();
            }
        }

        async function checkNextPrev() {
            // Siguiente
            const { data: n } = await _supabase.from('Capitulos').select('*').eq('manga_id', mangaId).eq('numero_capitulo', capActual + 1).single();
            if(n) {
                const b = document.getElementById('next-cap');
                b.classList.remove('disabled');
                b.onclick = () => window.location.href = `lector-manga.html?mangaId=${mangaId}&cap=${n.numero_capitulo}&url=${n.leer_url}`;
            }

            // Anterior
            const { data: p } = await _supabase.from('Capitulos').select('*').eq('manga_id', mangaId).eq('numero_capitulo', capActual - 1).single();
            if(p) {
                const b = document.getElementById('prev-cap');
                b.classList.remove('disabled');
                b.onclick = () => window.location.href = `lector-manga.html?mangaId=${mangaId}&cap=${p.numero_capitulo}&url=${p.leer_url}`;
            }
        }

        initLector();
    </script>
</body>
</html>
