<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #050505; 
            color: white; 
            margin: 0; 
            font-family: 'Inter', sans-serif;
        }

        /* Contenedor que centra la lectura */
        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 70px; /* Espacio para el nav */
        }

        /* CORRECCIÓN DEFINITIVA DE LA IMAGEN */
        .manga-img {
            display: block;
            width: 100%;           /* Se ajusta al ancho del dispositivo */
            max-width: 800px;      /* Límite para que no se vea gigante en PC */
            height: auto !important; /* MANTIENE LA PROPORCIÓN REAL (EVITA EL CORTE) */
            margin: 0 auto;
            object-fit: contain;   /* Asegura que se vea toda la imagen */
        }

        /* Barra de navegación clásica */
        .nav-reader {
            position: fixed;
            top: 0;
            width: 100%;
            background: #000;
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111;
        }

        /* Separador entre páginas */
        .divider {
            height: 5px;
            width: 100%;
            background: #050505;
        }
    </style>
</head>
<body>

    <nav class="nav-reader">
        <a href="index.html" class="text-[#ff6700] font-black italic tracking-tighter text-xl">MZ</a>
        <div id="cap-info" class="text-[10px] uppercase font-bold tracking-widest text-zinc-500 italic">Cargando...</div>
        <button onclick="window.history.back()" class="bg-zinc-900 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-zinc-800 transition">
            Volver
        </button>
    </nav>

    <main id="main-viewer" class="viewer-container">
        </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imagesRaw = params.get('images') || params.get('url');
        const capNum = params.get('cap');

        if (capNum) {
            document.getElementById('cap-info').innerText = `Capítulo ${capNum}`;
        }

        function cargarLector() {
            const viewer = document.getElementById('main-viewer');
            if (!imagesRaw) return;

            let links = [];
            const data = decodeURIComponent(imagesRaw);

            try {
                // Si viene de Supabase como Array ["url"]
                const parsed = JSON.parse(data);
                links = Array.isArray(parsed) ? parsed : [parsed];
            } catch (e) {
                // Si viene como link de texto directo
                links = [data];
            }

            // Renderizar y limpiar links de corchetes o comillas extra
            viewer.innerHTML = links.map(url => {
                const linkLimpio = url.replace(/[\[\]"]/g, "").trim();
                return `
                    <img src="${linkLimpio}" class="manga-img" loading="lazy">
                    <div class="divider"></div>
                `;
            }).join('');
        }

        window.onload = cargarLector;
    </script>
</body>
</html>
