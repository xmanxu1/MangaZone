<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Lector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none;
        }

        #manga-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 120px; 
        }

        .manga-page {
            max-width: 100%;
            height: auto;
            display: block;
            pointer-events: none; 
        }

        /* Barra de Navegación Estática */
        .reader-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #1a1a1a;
            padding: 15px 10px;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            background: #151515;
            color: #a1a1aa;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            background: #202020;
            color: white;
            border-color: #333;
        }

        /* Estilo especial para el botón central de Capítulos */
        .btn-center {
            background: #1a1a1a;
            color: #ff6700;
            border: 1px solid rgba(255, 103, 0, 0.2);
        }
        
        .btn-center:hover {
            background: #ff6700;
            color: white;
            border-color: #ff6700;
        }

        .nav-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="manga-viewer">
        <div id="loading-status" class="py-20 text-zinc-700 animate-pulse font-black uppercase tracking-widest">Cargando...</div>
    </div>

    <nav class="reader-nav">
        <a href="index.html" class="nav-btn">
            <i class="fas fa-home"></i> Inicio
        </a>
        
        <button id="prev-cap" class="nav-btn disabled">
            <i class="fas fa-arrow-left"></i> Anterior
        </button>

        <button onclick="window.history.back()" class="nav-btn btn-center">
            <i class="fas fa-list-ul"></i> Capítulos
        </button>

        <button id="next-cap" class="nav-btn disabled">
            Siguiente <i class="fas fa-arrow-right"></i>
        </button>
    </nav>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        // Bloqueos de seguridad
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'i' || e.key === 'j') || e.key === 'F12') {
                e.preventDefault();
            }
        });

        async function initLector() {
            const params = new URLSearchParams(window.location.search);
            const mangaUrl = params.get('url');

            if (!mangaUrl) {
                document.getElementById('manga-viewer').innerHTML = "<p class='mt-20 text-zinc-500 text-center uppercase font-bold'>Error: No se encontraron imágenes para este capítulo.</p>";
                return;
            }

            // Separamos los links que vienen en la URL (Supabase los envía separados por coma si es un Array)
            const urls = mangaUrl.split(',');
            const viewer = document.getElementById('manga-viewer');
            
            // Limpiamos el mensaje de cargando
            viewer.innerHTML = "";

            // Creamos una imagen para cada URL encontrada
            urls.forEach((link) => {
                if (link.trim() !== "") {
                    const img = document.createElement('img');
                    img.src = link.trim();
                    img.className = 'manga-page';
                    img.alt = 'Página del Manga';
                    viewer.appendChild(img);
                }
            });
            
            // Activamos el botón "Siguiente" por si quieres programarlo luego
            document.getElementById('next-cap').classList.remove('disabled');
        }

        initLector();
    </script>
</body>
</html>
