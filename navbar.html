<style>
    /* Recuperando el diseño oscuro y minimalista */
    .navbar-custom {
        background-color: #0a0a0a;
        border-bottom: 1px solid #1a1a1a;
        padding: 15px 8%;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar-logo {
        font-size: 24px;
        font-weight: 900;
        color: #ff6700;
        text-transform: uppercase;
        letter-spacing: -1px;
        text-decoration: none;
        cursor: pointer;
    }

    /* Buscador estilizado */
    .search-container {
        position: relative;
    }

    .search-input {
        background-color: #1a1a1a;
        border: 1px solid #333;
        color: white;
        padding: 10px 15px 10px 40px;
        border-radius: 20px;
        font-size: 14px;
        width: 250px;
        transition: 0.3s;
    }

    .search-input:focus {
        border-color: #ff6700;
        outline: none;
        width: 300px;
    }

    .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #555;
        font-size: 14px;
    }

    /* Botón Entrar */
    .btn-entrar {
        background: none;
        border: none;
        color: #ccc;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-entrar:hover {
        color: #ff6700;
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<nav class="navbar-custom">
    <a class="navbar-logo" onclick="window.location.href='index.html'">MANGAZONE</a>
    
    <div class="flex items-center gap-6">
        <div class="search-container hidden md:block">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Buscar manga..." class="search-input">
        </div>

        <button class="btn-entrar" onclick="window.location.href='login.html'">ENTRAR</button>
    </div>
</nav>
