<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Detalles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        .hero-banner {
            height: 45vh; width: 100%;
            background-size: cover; background-position: center 20%;
            position: relative;
        }
        .hero-banner::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, #050505, transparent);
        }
        .main-content { position: relative; z-index: 10; margin-top: -150px; padding: 0 8%; }
        .poster {
            width: 250px; border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div id="manga-detail">
        </div>

    <div id="comentarios-container" class="max-w-[1400px] mx-auto px-[8%] py-10">
        </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        // 1. Cargar Navbar independiente
        fetch('navbar.html').then(res => res.text()).then(html => {
            document.getElementById('navbar-placeholder').innerHTML = html;
        });

        async function loadManga() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // Consultar tabla Mangas
            const { data: manga, error } = await _supabase
                .from('Mangas')
                .select('*')
                .eq('id', id)
                .single();

            if (manga) {
                document.getElementById('manga-detail').innerHTML = `
                    <div class="hero-banner" style="background-image: url('${manga.banner_url}')"></div>
                    <div class="main-content flex flex-col md:flex-row gap-10">
                        <img src="${manga.portada_url}" class="poster flex-shrink-0">
                        <div class="pt-20">
                            <h1 class="text-5xl font-black uppercase mb-4">${manga.titulo}</h1>
                            <p class="text-zinc-400 text-lg max-w-2xl mb-8">${manga.sinopsis || 'Sin descripción.'}</p>
                            <a href="${manga.leer_url}" class="inline-block bg-[#ff6700] px-10 py-3 rounded-lg font-black uppercase tracking-widest hover:scale-105 transition">Leer Ahora</a>
                        </div>
                    </div>
                `;
                
                // Inicializar sistema de comentarios
                setupComments(id);
            }
        }

        // FUNCIÓN DE COMENTARIOS INTEGRADA
        async function setupComments(mangaId) {
            const { data: { user } } = await _supabase.auth.getUser();
            const container = document.getElementById('comentarios-container');
            if (!container) return;

            if (user) {
                // Interfaz para usuarios logueados
                container.innerHTML = `
                    <div class="mt-10 bg-[#0a0a0a] p-6 rounded-xl border border-zinc-800">
                        <h3 class="text-xl font-bold mb-4 text-[#ff6700]">Comparte tu opinión</h3>
                        <textarea id="commentText" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-lg text-white outline-none focus:border-[#ff6700]" placeholder="¿Qué te pareció este manga?"></textarea>
                        <button id="sendComment" class="mt-3 bg-[#ff6700] px-6 py-2 rounded font-bold text-xs uppercase hover:bg-orange-600 transition">Publicar</button>
                    </div>
                    <div id="lista-comentarios" class="mt-8 space-y-4"></div>
                `;

                document.getElementById('sendComment').onclick = async () => {
                    const contenido = document.getElementById('commentText').value;
                    if(!contenido.trim()) return;

                    // Guardar en la nueva tabla de Supabase
                    const { error } = await _supabase.from('Comentarios').insert([
                        { user_id: user.id, manga_id: mangaId, contenido: contenido, user_email: user.email }
                    ]);

                    if (error) alert("Error al publicar: " + error.message);
                    else {
                        document.getElementById('commentText').value = '';
                        loadComments(mangaId); 
                    }
                };
            } else {
                // Mensaje para invitados
                container.innerHTML = `
                    <div class="mt-10 bg-zinc-900/30 p-8 rounded-xl text-center border border-dashed border-zinc-800">
                        <p class="text-zinc-400 mb-4 text-sm">Debes iniciar sesión para comentar.</p>
                        <a href="login.html" class="inline-block bg-[#ff6700] px-6 py-2 rounded font-bold text-xs uppercase text-white hover:bg-orange-600">Entrar</a>
                    </div>
                    <div id="lista-comentarios" class="mt-8 space-y-4"></div>
                `;
            }
            loadComments(mangaId);
        }

        async function loadComments(mangaId) {
            const { data: comentarios } = await _supabase
                .from('Comentarios')
                .select('*')
                .eq('manga_id', mangaId)
                .order('created_at', { ascending: false });

            const lista = document.getElementById('lista-comentarios');
            if (comentarios && comentarios.length > 0) {
                lista.innerHTML = comentarios.map(c => `
                    <div class="p-4 bg-zinc-900/20 border border-zinc-900 rounded-lg">
                        <div class="flex justify-between text-[10px] mb-2 text-zinc-500 font-bold uppercase tracking-widest">
                            <span>${c.user_email.split('@')[0]}</span>
                            <span>${new Date(c.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-zinc-300 text-sm">${c.contenido}</p>
                    </div>
                `).join('');
            } else {
                lista.innerHTML = '<p class="text-zinc-600 text-center text-xs italic py-10">Aún no hay comentarios. ¡Sé el primero!</p>';
            }
        }

        loadManga();
    </script>
</body>
</html>
