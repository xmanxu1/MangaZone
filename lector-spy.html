<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone - Lector Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: sans-serif; overflow: hidden; margin: 0; }
        
        /* Efecto Neón MangaZone */
        .neon-text {
            color: #fff;
            text-shadow: 
                0 0 7px #ff6700,
                0 0 10px #ff6700,
                0 0 21px #ff6700;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .reader-nav { 
            background: #0f0f0f; 
            border-bottom: 1px solid #222; 
            height: 70px; 
            display: flex; 
            align-items: center; 
        }

        .btn-nav { 
            background: #1a1a1a; 
            padding: 8px 20px; 
            border-radius: 5px; 
            font-size: 13px; 
            font-weight: bold;
            transition: 0.3s; 
            border: 1px solid #333;
        }

        .btn-nav:hover:not(:disabled) { 
            background: #ff6700; 
            color: white; 
            border-color: #ff6700;
            box-shadow: 0 0 15px rgba(255, 103, 0, 0.4);
        }

        .btn-nav:disabled { opacity: 0.1; cursor: not-allowed; }

        /* Contenedor Centrado */
        .manga-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
            background: #000;
            overflow: hidden;
        }

        #manga-img {
            max-height: 98vh;
            max-width: 100%;
            object-fit: contain;
            user-select: none;
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="reader-nav px-8">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            
            <a href="index.html" class="neon-text text-xl no-underline">
                MangaZone
            </a>
            
            <div class="flex items-center gap-6">
                <button id="btn-ant" class="btn-nav" onclick="cambiarPagina(-1)">ANTERIOR</button>
                
                <div class="flex flex-col items-center">
                    <span id="info-pag" class="text-orange-500 font-mono text-sm font-bold">1 / 1</span>
                    <span class="text-[10px] text-zinc-600 uppercase tracking-tighter">Página</span>
                </div>
                
                <button id="btn-sig" class="btn-nav" onclick="cambiarPagina(1)">SIGUIENTE</button>
            </div>

            <div class="hidden md:block text-zinc-700 text-[10px] font-bold uppercase tracking-[0.5em]">
                Spy x Family - Cap 1
            </div>
        </div>
    </nav>

    <div class="manga-container" onclick="cambiarPagina(1)">
        <img id="manga-img" src="" alt="Cargando capítulo...">
    </div>

    <script>
        // Lista de páginas (Añade aquí tus links directos)
        const paginas = [
            "https://i.postimg.cc/mD363Yf7/image-8283cb.jpg" // Página 1
        ];

        let indiceActual = 0;
        const imgElement = document.getElementById('manga-img');
        const infoPag = document.getElementById('info-pag');
        const btnAnt = document.getElementById('btn-ant');

        function actualizarLector() {
            if (paginas.length > 0) {
                imgElement.src = paginas[indiceActual];
                infoPag.innerText = `${indiceActual + 1} / ${paginas.length}`;
                btnAnt.disabled = (indiceActual === 0);
            }
        }

        function cambiarPagina(direccion) {
            const nuevoIndice = indiceActual + direccion;
            if (nuevoIndice >= 0 && nuevoIndice < paginas.length) {
                indiceActual = nuevoIndice;
                actualizarLector();
            }
        }

        // Control por teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") cambiarPagina(1);
            if (e.key === "ArrowLeft") cambiarPagina(-1);
        });

        actualizarLector();
    </script>
</body>
</html>
