<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone - Lector Spy x Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #e5e5e5; font-family: sans-serif; overflow: hidden; margin: 0; }
        
        /* Estilo Neón MangaZone */
        .neon-logo {
            color: #fff;
            text-shadow: 0 0 5px #ff6700, 0 0 10px #ff6700, 0 0 20px #ff6700;
            font-weight: 900;
            text-decoration: none;
        }

        .reader-nav { background: #121212; border-bottom: 1px solid #222; height: 70px; display: flex; align-items: center; }
        
        .btn-nav { 
            background: #252525; padding: 8px 16px; border-radius: 6px; 
            font-size: 14px; transition: 0.3s; border: 1px solid #333; 
        }
        .btn-nav:hover:not(:disabled) { background: #ff6700; color: white; box-shadow: 0 0 10px rgba(255, 103, 0, 0.4); }
        .btn-nav:disabled { opacity: 0.2; }

        .manga-container {
            display: flex; justify-content: center; align-items: center;
            height: calc(100vh - 70px); background: #000;
        }
        #manga-img { max-height: 100%; max-width: 100%; object-fit: contain; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="reader-nav px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="index.html" class="neon-logo text-xl">MANGAZONE</a>
            
            <div class="flex items-center gap-4">
                <button id="btn-ant" class="btn-nav" onclick="cambiarPagina(-1)">ANTERIOR</button>
                
                <select id="selector-cap" class="bg-[#252525] border border-[#333] p-2 rounded text-white">
                    <option value="lector-spy.html" selected>Capítulo 1</option>
                </select>

                <span id="info-pag" class="text-orange-500 font-bold w-[60px] text-center">1 / 1</span>
                
                <button id="btn-sig" class="btn-nav" onclick="cambiarPagina(1)">SIGUIENTE</button>
            </div>

            <div class="hidden md:block text-zinc-500 text-xs tracking-widest uppercase">Spy x Family</div>
        </div>
    </nav>

    <div class="manga-container" onclick="cambiarPagina(1)">
        <img id="manga-img" src="" alt="Cargando...">
    </div>

    <script>
        // PEGA AQUÍ LOS LINKS DE TUS PNG
        const paginas = [
            "https://i.postimg.cc/mD363Yf7/image-8283cb.jpg" 
        ];

        let indiceActual = 0;
        const imgElement = document.getElementById('manga-img');
        const infoPag = document.getElementById('info-pag');
        const btnAnt = document.getElementById('btn-ant');

        function actualizarLector() {
            imgElement.src = paginas[indiceActual];
            infoPag.innerText = `${indiceActual + 1} / ${paginas.length}`;
            btnAnt.disabled = (indiceActual === 0);
        }

        function cambiarPagina(direccion) {
            const nuevoIndice = indiceActual + direccion;
            if (nuevoIndice >= 0 && nuevoIndice < paginas.length) {
                indiceActual = nuevoIndice;
                actualizarLector();
            }
        }

        actualizarLector();
    </script>
</body>
</html>
