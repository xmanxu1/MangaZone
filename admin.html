<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        input, select, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #ff6700 !important; }
        #auth-overlay { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="text-center">
            <h2 class="text-xl font-black uppercase tracking-widest mb-4 italic">Introduce PIN</h2>
            <input type="password" id="pin-input" class="p-4 rounded-2xl text-center text-2xl w-64 border border-zinc-800">
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-xl w-full glass p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black uppercase mb-6 text-[#ff6700] italic">Subir Contenido</h1>
            
            <div class="space-y-4">
                <select id="mangaSelect" class="w-full p-4 rounded-xl text-sm italic">
                    <option>Cargando mangas...</option>
                </select>

                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="capNum" step="0.1" placeholder="N° Capítulo" class="p-4 rounded-xl">
                    <input type="text" id="capTitulo" placeholder="Nombre Cap (Opcional)" class="p-4 rounded-xl">
                </div>

                <div>
                    <label class="text-[10px] text-zinc-500 font-bold uppercase mb-2 block ml-1">URLs de las páginas (una por línea)</label>
                    <textarea id="capUrl" class="w-full p-4 rounded-xl h-48 text-xs font-mono" placeholder="https://link1.jpg&#10;https://link2.jpg"></textarea>
                </div>

                <button id="btnSubir" class="w-full bg-[#ff6700] py-5 rounded-xl font-black uppercase tracking-widest hover:bg-orange-600 transition shadow-lg shadow-orange-900/20">Publicar Capítulo</button>
                <p id="mensaje" class="text-center text-xs font-bold uppercase mt-2"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const _supabase = createClient('https://uupnzgchqvqjxffiunae.supabase.co', 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L')

        const PIN = '2026';
        document.getElementById('pin-input').addEventListener('input', (e) => {
            if(e.target.value === PIN) {
                document.getElementById('auth-overlay').style.display = 'none';
                cargarMangas();
            }
        });

        async function cargarMangas() {
            const { data } = await _supabase.from('Mangas').select('id, titulo');
            document.getElementById('mangaSelect').innerHTML = data.map(m => `<option value="${m.id}">${m.titulo}</option>`).join('');
        }

        document.getElementById('btnSubir').onclick = async () => {
            const mid = document.getElementById('mangaSelect').value;
            const num = document.getElementById('capNum').value;
            const tit = document.getElementById('capTitulo').value;
            const rawUrls = document.getElementById('capUrl').value;
            const msg = document.getElementById('mensaje');

            const urlsArray = rawUrls.split('\n').map(l => l.trim()).filter(l => l !== "");

            if(!num || urlsArray.length === 0) {
                msg.innerText = "❌ Completa los campos";
                return;
            }

            msg.innerText = "Subiendo...";
            const { error } = await _supabase.from('Capitulos').insert([{
                manga_id: mid,
                numero_capitulo: parseFloat(num),
                titulo_capitulo: tit,
                leer_url: urlsArray
            }]);

            if(error) {
                msg.innerText = "Error: " + error.message;
            } else {
                msg.innerText = "✅ ¡Capítulo Publicado!";
                document.getElementById('capUrl').value = "";
                document.getElementById('capNum').value = parseFloat(num) + 1;
            }
        };
    </script>
</body>
</html>
