<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaZone | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .input-field {
            background: #111; border: 1px solid #222; padding: 12px;
            border-radius: 8px; width: 100%; color: white; outline: none;
        }
        .input-field:focus { border-color: #ff6700; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px; border-radius: 20px; }
    </style>
</head>
<body class="p-10">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-black mb-10 text-[#ff6700] uppercase tracking-tighter italic">Subir Nuevo Capítulo</h1>
        
        <div class="card space-y-6">
            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase">1. Seleccionar Manga</label>
                <select id="mangaSelect" class="input-field">
                    <option value="">Cargando mangas...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase">2. Número del Capítulo</label>
                <input type="number" id="capNumero" class="input-field" placeholder="Ej: 1.5">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase">3. Título (Opcional)</label>
                <input type="text" id="capTitulo" class="input-field" placeholder="Ej: El inicio del fin">
            </div>

            <div>
                <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase">4. Link de la Imagen (ImgBB/Directo)</label>
                <input type="text" id="capUrl" class="input-field" placeholder="https://i.ibb.co/...">
                <p class="text-[10px] text-zinc-600 mt-2 italic">Sube tu imagen a ImgBB y pega aquí el "Enlace directo".</p>
            </div>

            <button id="btnSubir" class="w-full bg-[#ff6700] p-4 rounded-xl font-black uppercase tracking-widest hover:bg-orange-600 transition shadow-lg shadow-orange-900/20">
                Guardar Capítulo
            </button>
        </div>

        <div id="status" class="mt-6 text-center font-bold text-sm"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://uupnzgchqvqjxffiunae.supabase.co'
        const supabaseKey = 'sb_publishable_eF1GrETdV8n2iLlaql4-Mw_I6BMkC2L' 
        const _supabase = createClient(supabaseUrl, supabaseKey)

        // Cargar la lista de mangas disponibles
        async function loadMangas() {
            const { data } = await _supabase.from('Mangas').select('id, titulo');
            const select = document.getElementById('mangaSelect');
            if (data) {
                select.innerHTML = '<option value="">-- Elige un manga --</option>' + 
                    data.map(m => `<option value="${m.id}">${m.titulo}</option>`).join('');
            }
        }

        document.getElementById('btnSubir').onclick = async () => {
            const mid = document.getElementById('mangaSelect').value;
            const num = document.getElementById('capNumero').value;
            const tit = document.getElementById('capTitulo').value;
            const url = document.getElementById('capUrl').value;
            const status = document.getElementById('status');

            if(!mid || !num || !url) {
                status.innerText = "❌ Faltan datos importantes";
                status.className = "mt-6 text-red-500";
                return;
            }

            status.innerText = "Subiendo...";

            const { error } = await _supabase.from('Capitulos').insert([
                { 
                    manga_id: mid, 
                    numero_capitulo: parseFloat(num), 
                    titulo_capitulo: tit, 
                    leer_url: url 
                }
            ]);

            if (error) {
                status.innerText = "❌ Error: " + error.message;
                status.className = "mt-6 text-red-500";
            } else {
                status.innerText = "✅ ¡Capítulo subido con éxito!";
                status.className = "mt-6 text-green-500";
                // Limpiar campos
                document.getElementById('capNumero').value = '';
                document.getElementById('capTitulo').value = '';
                document.getElementById('capUrl').value = '';
            }
        };

        loadMangas();
    </script>
</body>
</html>
